<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Ealdforn · Childhood Dreamscape Horror</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void: #060300;
      --surface: #0e0804;
      --blood: #8a0a0a;
      --blood-bright: #c40a0a;
      --flicker: #e8d8a0;
      --flicker-dim: #8a7a40;
      --health-high: #40c8c0;
      --health-mid: #e8a840;
      --health-low: #e8602a;
      --health-dead: #8a0a0a;
      --text: #f0e0d0;
      --text-dim: #8a7a6a;
      --mono: 'Share Tech Mono', monospace;
    }

    html {
      font-size: 18px;
    }

    body {
      background: var(--void);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @media (max-width: 768px) {
      html { font-size: 16px; }
    }

    /* Broadcast Bar */
    .broadcast-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: linear-gradient(90deg, #080402 0%, #0a0a08 100%);
      border-bottom: 2px solid var(--blood);
      gap: 1rem;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--blood-bright);
      flex-shrink: 0;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blood-bright);
      box-shadow: 0 0 8px var(--blood-bright);
      animation: livepulse 1.4s ease-in-out infinite;
    }

    @keyframes livepulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.65); }
    }

    .bar-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--flicker);
      text-align: center;
      flex: 1;
    }

    /* Main Container */
    .game-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Health Bar */
    .health-container {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--blood);
      border-radius: 12px;
      padding: 0.6rem 1rem;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .health-container.visible {
      opacity: 1;
    }

    .health-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    .health-bar-bg {
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      height: 16px;
      overflow: hidden;
    }

    .health-fill {
      width: 100%;
      height: 100%;
      background: var(--health-high);
      transition: width 0.3s ease, background-color 0.3s;
      border-radius: 6px;
    }

    .health-value {
      font-family: var(--mono);
      font-size: 0.5rem;
      color: var(--text-dim);
      text-align: right;
      margin-top: 0.2rem;
    }

    /* Image Anchor */
    .image-anchor {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--blood);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      background: #000;
    }

    .image-anchor img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Narration */
    .narration-box {
      background: rgba(0,0,0,0.7);
      border-left: 4px solid var(--blood);
      padding: 1rem 1.2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.6;
      font-style: italic;
      color: var(--text);
    }

    /* Choices */
    .choices-container {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }

    .choice-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--blood);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--flicker);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      letter-spacing: 0.03em;
    }

    .choice-btn:hover {
      background: rgba(138,10,10,0.2);
      border-color: var(--blood-bright);
      transform: translateX(4px);
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .action-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--text-dim);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-family: var(--mono);
      font-size: 0.5rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--blood);
      color: var(--blood-bright);
    }

    /* Death Screen */
    .death-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s;
      backdrop-filter: blur(4px);
    }

    .death-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .death-content {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
      border: 2px solid var(--blood);
      background: var(--surface);
      border-radius: 16px;
    }

    .death-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem;
      color: var(--blood-bright);
      margin-bottom: 1rem;
    }

    .death-text {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .reset-death-btn {
      background: var(--blood);
      border: none;
      padding: 0.6rem 1.2rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(0,0,0,0.9);
      border: 1px solid var(--blood);
      color: var(--flicker);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.55rem;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="broadcast-bar">
  <div class="live-badge"><div class="live-dot"></div>HORROR</div>
  <div class="bar-title">CHILDHOOD DREAMSCAPE · THE DESCENT</div>

<div class="game-container" id="gameContainer">

  <div class="choices-container" id="choicesContainer"></div>

  <div class="action-buttons">

  </div>
</div>

<div class="death-overlay" id="deathOverlay">

    <button class="reset-death-btn" id="deathResetBtn">BEGIN AGAIN</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════

// Endings (will be dynamically added based on health)
function resolveEnding() {
  if (currentHealth <= 0) {
    showDeath("Your body gives out. The darkness takes you. You wake up in the cage. The door is closed now.");
    return;
  }
  
  // Health-based endings from attic
  if (currentHealth > 60) {
    showEnding("escape", "You climb through the window. Fresh air. Rain on your face. You're in a field. The house is gone. You never speak of this again. But sometimes, late at night, you hear the ice cream truck music. Far away. Getting closer.",
               "⟡ ESCAPE ⟡");
  } else if (currentHealth > 30) {
    showEnding("imposter", "You make it home. Your parents are there. They look right. But the furniture is slightly shifted. They don't notice. You're not sure you're you anymore. Sometimes you catch yourself staring at mirrors, waiting for the reflection to move on its own.",
               "⟡ THE IMPOSTER ⟡");
  } else if (currentHealth > 0) {
    showEnding("cage", "The ladder leads to another basement. The cage is open. It's not empty anymore. It's waiting for you. You step inside. The door closes behind you. The bulb flickers. A small figure sits in the corner. Back turned. White dress.",
               "⟡ THE CAGE ⟡");
  }
}

// Special endings
function endingDeathGoddess() {
  showEnding("death_goddess", "You take the door down. Izanami walks beside you. 'It's not so bad,' she says. 'I've been alone for a very long time.' The darkness becomes a garden. Black flowers. A sky with no sun. You sit beside her. 'Tell me about fire,' you say. She smiles. 'It was beautiful. Right up until the end.'",
             "⟡ THE GATEKEEPER ⟡");
}

function endingLure() {
  showEnding("lure", "You take the ice cream. It tastes like childhood. Like summer. Like the last day before everything changed. You keep eating. You can't stop. The truck drives away with you still reaching for the window. The music plays. Forever.",
             "⟡ THE LURE ⟡");
}

function endingLoop() {
  showEnding("loop", "You record the music. It plays on loop. Forever. You're still listening. The song never ends. Neither do you. Somewhere, in another version of this story, you made a different choice. You don't remember that version. You only remember the music.",
             "⟡ THE LOOP ⟡");
}

// UI Functions
function updateHealthUI() {
  const fill = document.getElementById('healthFill');
  const value = document.getElementById('healthValue');
  const percent = (currentHealth / 100) * 100;
  fill.style.width = `${percent}%`;
  
  if (percent > 60) fill.style.backgroundColor = '#40c8c0';
  else if (percent > 30) fill.style.backgroundColor = '#e8a840';
  else fill.style.backgroundColor = '#e8602a';
  
  value.textContent = `${Math.max(0, currentHealth)} / 100`;
}

function showHealthBar() {
  const container = document.getElementById('healthContainer');
  container.classList.add('visible');
}

function applyHealthDelta(delta) {
  currentHealth = Math.max(0, Math.min(100, currentHealth + delta));
  updateHealthUI();
  
  if (currentHealth <= 0) {
    showDeath("Your body gives out. The darkness takes you. You wake up in the cage. The door is closed now.");
    return false;
  }
  return true;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function showDeath(message) {
  const overlay = document.getElementById('deathOverlay');
  const deathText = document.getElementById('deathText');
  deathText.textContent = message;
  overlay.classList.add('open');
}

function showEnding(type, message, title) {
  const overlay = document.getElementById('deathOverlay');
  const deathText = document.getElementById('deathText');
  const deathTitle = document.querySelector('#deathOverlay .death-title');
  deathTitle.textContent = title;
  deathText.textContent = message;
  overlay.classList.add('open');
  
  // Save ending to localStorage for achievement tracking
  localStorage.setItem('ealdforn_horror_ending', type);
}

function renderNode(nodeId) {
  const node = STORY_NODES[nodeId];
  if (!node) {
    resolveEnding();
    return;
  }
  
  currentNodeId = nodeId;
  
  // Update image
  const img = document.getElementById('storyImage');
  img.src = node.image;
  img.alt = "Scene";
  
  // Update narration
  document.getElementById('narrationText').textContent = node.narration;
  
  // Apply health delta
  if (node.healthDelta !== 0) {
    applyHealthDelta(node.healthDelta);
  }
  
  // Show health bar if we're at or past hospital (and not already visible)
  if (nodeId === 'hospital' || nodeId === 'hospital_early' || 
      (currentHealth < 90 && !document.getElementById('healthContainer').classList.contains('visible'))) {
    showHealthBar();
  }
  
  // Special handling for endings
  if (nodeId === 'ending_death_goddess') {
    endingDeathGoddess();
    return;
  }
  if (nodeId === 'ending_lure') {
    endingLure();
    return;
  }
  if (nodeId === 'ending_loop') {
    endingLoop();
    return;
  }
  
  // Render choices
  const choicesContainer = document.getElementById('choicesContainer');
  if (node.choices && node.choices.length > 0) {
    choicesContainer.innerHTML = node.choices.map(choice => `
      <button class="choice-btn" data-next="${choice.nextId}" data-health="${choice.healthDelta || 0}">
        ${choice.text}
      </button>
    `).join('');
    
    // Attach event listeners
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const nextId = btn.dataset.next;
        const healthDelta = parseInt(btn.dataset.health) || 0;
        if (healthDelta !== 0) {
          if (!applyHealthDelta(healthDelta)) return;
        }
        renderNode(nextId);
      });
    });
  } else {
    // No choices — resolve ending
    resolveEnding();
  }
}

function resetGame() {
  currentHealth = 100;
  currentNodeId = 'start';
  updateHealthUI();
  document.getElementById('healthContainer').classList.remove('visible');
  document.getElementById('deathOverlay').classList.remove('open');
  renderNode('start');
  showToast('⟡ Story reset. The basement waits.');
}

function saveGame() {
  const save = {
    health: currentHealth,
    nodeId: currentNodeId,
    timestamp: Date.now()
  };
  localStorage.setItem('ealdforn_horror_save', JSON.stringify(save));
  showToast('💾 Progress saved');
}

function loadGame() {
  const saved = localStorage.getItem('ealdforn_horror_save');
  if (saved) {
    try {
      const save = JSON.parse(saved);
      currentHealth = save.health;
      currentNodeId = save.nodeId;
      updateHealthUI();
      if (currentHealth < 100) showHealthBar();
      renderNode(currentNodeId);
      showToast('⟡ Save loaded');
    } catch(e) { resetGame(); }
  } else {
    showToast('No save found');
  }
}

// Event listeners and init
document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('saveBtn').addEventListener('click', saveGame);
document.getElementById('deathResetBtn').addEventListener('click', resetGame);

// Check for save on load

if (saved) {

    const save = JSON.parse(saved);
    currentHealth = save.health;
    currentNodeId = save.nodeId;
    updateHealthUI();
    if (currentHealth < 100) showHealthBar();
    renderNode(currentNodeId);
  } catch(e) { renderNode('start'); }
} else {
  renderNode('start');
}
