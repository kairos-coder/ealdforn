<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ealdforn Stage — Performance</title>
<style>
:root {
  --bg: #0d0a05; --surface: #1a1410; --border: #2a1f18;
  --text: #d4c0a0; --text-bright: #f0dcc0; --text-dim: #7a6a50;
  --gold: #c9a84c; --amber: #c9702e; --rubric: #8b3a3a;
  --font-body: 'Georgia', 'Times New Roman', serif;
  --font-mono: 'Courier New', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text); font-family:var(--font-body);
  min-height:100vh; display:flex; justify-content:center; align-items:flex-start;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 100%, rgba(139,58,58,0.03) 0%, transparent 40%);
}

.stage-wrapper {
  max-width:900px; width:100%; margin:20px; display:flex; gap:20px;
  min-height:90vh;
}

/* ── MAIN STAGE ── */
.stage-main {
  flex:1; display:flex; flex-direction:column; gap:0;
  border:1px solid var(--border); border-radius:6px; overflow:hidden;
  background:var(--surface); box-shadow:0 0 40px rgba(0,0,0,0.3);
  min-width:0;
}

.stage-header {
  padding:12px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
  background:rgba(0,0,0,0.2);
}
.stage-header .header-icon { font-size:20px; }
.stage-header .header-title { font-size:13px; color:var(--gold); letter-spacing:1px; }
.stage-header .spacer { flex:1; }
.stage-header .scene-badge {
  font-family:var(--font-mono); font-size:9px; padding:3px 10px;
  border:1px solid var(--amber); border-radius:8px; color:var(--amber);
  white-space:nowrap;
}
.stage-header a {
  font-family:var(--font-mono); font-size:8px; color:var(--text-dim);
  text-decoration:none; letter-spacing:1px; transition:all 0.2s;
}
.stage-header a:hover { color:var(--gold); }

/* ── STAGE CONTENT ── */
#stageContainer {
  flex:1; display:flex; flex-direction:column;
}

.scene-image {
  width:100%; max-height:280px; overflow:hidden; border-bottom:1px solid var(--border);
  background:var(--bg);
}
.scene-image img {
  width:100%; height:auto; max-height:280px; object-fit:cover; display:block;
}
.img-placeholder {
  padding:50px; text-align:center; color:var(--text-dim); font-style:italic; font-size:14px;
}

.scene-world {
  padding:8px 18px; display:flex; justify-content:space-between;
  border-bottom:1px solid rgba(42,31,24,0.5); background:rgba(0,0,0,0.15);
}
.scene-location { font-size:10px; color:var(--amber); letter-spacing:1px; }
.scene-weather { font-size:10px; color:var(--text-dim); font-style:italic; }

.scene-prologue, .scene-narration {
  padding:18px; font-size:14px; line-height:1.8; border-bottom:1px solid var(--border);
}
.prologue-title { font-size:18px; color:var(--gold); letter-spacing:2px; margin-bottom:4px; }
.prologue-subtitle { font-size:10px; color:var(--text-dim); letter-spacing:1px; margin-bottom:12px; font-family:var(--font-mono); text-transform:uppercase; }
.prologue-text { margin-bottom:12px; }
.prologue-player { font-style:italic; color:var(--text-dim); }
.player-name { color:var(--rubric); }

.scene-arrival {
  padding:14px 18px; font-size:14px; line-height:1.7; border-bottom:1px solid var(--border);
}
.actor-glyph { font-size:20px; }
.actor-name { font-weight:bold; letter-spacing:1px; }
.actor-domain { font-style:italic; color:var(--text-dim); }

.scene-speech {
  padding:14px 18px; font-size:15px; line-height:1.7; font-style:italic;
  border-bottom:1px solid var(--border); background:rgba(0,0,0,0.1);
  color:var(--text-bright);
}

.scene-outcome {
  padding:18px; font-size:14px; line-height:1.8;
}
.trait-gain {
  padding:8px 18px; font-size:10px; color:var(--text-dim);
  font-family:var(--font-mono); border-top:1px solid var(--border);
}
.trait-name { color:var(--gold); }

.scene-curtain {
  padding:24px 18px; text-align:center;
}
.curtain-title { font-size:20px; color:var(--gold); letter-spacing:3px; margin-bottom:6px; }
.curtain-subtitle { font-size:12px; color:var(--text-dim); margin-bottom:16px; }
.curtain-ending { font-size:14px; line-height:1.8; margin-bottom:16px; max-width:500px; margin-left:auto; margin-right:auto; }
.curtain-traits { font-size:10px; color:var(--text-dim); font-family:var(--font-mono); margin-bottom:18px; }
.curtain-actions { display:flex; gap:10px; justify-content:center; }

.scene-actions {
  padding:14px 18px; display:flex; gap:10px; justify-content:center;
}

/* ── CHOICES ── */
#choicesContainer {
  padding:12px 18px; display:flex; flex-direction:column; gap:8px;
  background:var(--bg); border-top:1px solid var(--border);
}
.stage-choice {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:12px 16px; font-family:var(--font-body); font-size:13px;
  border-radius:4px; cursor:pointer; text-align:left; transition:all 0.2s;
  line-height:1.5; display:flex; align-items:center; gap:10px;
}
.stage-choice:hover { border-color:var(--gold); background:rgba(201,168,76,0.05); color:var(--text-bright); }
.choice-glyph { font-size:20px; flex-shrink:0; }
.choice-text { flex:1; }
.choice-hint { font-size:9px; color:var(--text-dim); font-family:var(--font-mono); }

.stage-btn {
  background:var(--surface); border:1px solid var(--gold); color:var(--gold);
  padding:10px 20px; font-family:var(--font-body); font-size:13px;
  border-radius:4px; cursor:pointer; text-align:center; transition:all 0.2s;
  text-decoration:none; display:inline-block;
}
.stage-btn:hover { background:rgba(201,168,76,0.1); color:var(--text-bright); }

/* ── CHRONICLE SIDEBAR ── */
.stage-sidebar {
  width:260px; flex-shrink:0; display:flex; flex-direction:column;
  border:1px solid var(--border); border-radius:6px; overflow:hidden;
  background:var(--surface); box-shadow:0 0 40px rgba(0,0,0,0.3);
}
.sidebar-header {
  padding:10px 14px; border-bottom:1px solid var(--border);
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px;
  color:var(--text-dim); text-transform:uppercase; background:rgba(0,0,0,0.2);
}
#chronicleBody {
  flex:1; overflow-y:auto; padding:10px 14px;
}
.chronicle-entry {
  font-size:10px; color:var(--text-dim); margin-bottom:6px; line-height:1.5;
  padding-bottom:6px; border-bottom:1px solid rgba(42,31,24,0.3);
}
.chronicle-entry:last-child { border-bottom:none; }
.c-scene { color:var(--amber); font-family:var(--font-mono); font-size:9px; }
.c-actor { color:var(--gold); }
.c-trait { color:var(--rubric); font-family:var(--font-mono); font-size:8px; }
.chronicle-empty {
  text-align:center; padding:20px; color:var(--text-dim); font-style:italic; font-size:11px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── RESPONSIVE ── */
@media (max-width:750px) {
  .stage-wrapper { flex-direction:column; }
  .stage-sidebar { width:100%; max-height:150px; }
  .scene-image { max-height:200px; }
  .scene-image img { max-height:200px; }
}
</style>
</head>
<body>

<div class="stage-wrapper">

  <!-- MAIN STAGE -->
  <div class="stage-main">
    <div class="stage-header">
      <span class="header-icon">🎭</span>
      <span class="header-title" id="headerTitle">Ealdforn Stage</span>
      <span class="spacer"></span>
      <span class="scene-badge" id="sceneBadge">Raising curtain...</span>
      <a href="index.html">◈ PLAYBILL</a>
    </div>

    <div id="stageContainer">
      <div class="img-placeholder">The curtain rises...</div>
    </div>

    <div id="choicesContainer"></div>
  </div>

  <!-- CHRONICLE SIDEBAR -->
  <div class="stage-sidebar">
    <div class="sidebar-header">📜 Chronicle</div>
    <div id="chronicleBody">
      <div class="chronicle-empty">The chronicle awaits the first scene...</div>
    </div>
  </div>

</div>

<script src="stage.js"></script>
</body>
</html>
