<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telumë · The Atlas · The Vault of Heaven</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --parchment: #F5ECD7;
      --parchment-deep: #EAD9BE;
      --ink: #1A1008;
      --ink-mid: #3A2810;
      --ink-dim: #6A5030;
      --gold: #C8980A;
      --gold-dark: #8A6008;
      --gold-glow: rgba(200,152,10,0.4);
      --border: rgba(164,134,80,0.35);
    }

    body {
      background: var(--parchment-deep);
      background-image:
        radial-gradient(ellipse 50% 40% at 30% 30%, rgba(200,152,10,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 70% 70%, rgba(42,64,112,0.05) 0%, transparent 50%);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: rgba(245,236,215,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark);
    }
    .nav-links {
      display: flex; gap: 1.5rem; list-style: none;
    }
    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-dim); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-dark); }

    .map-wrapper {
      position: relative;
      width: min(840px, 95vw);
      margin: 2rem auto;
      background: var(--parchment);
      border: 1px solid var(--border);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.08),
        inset 0 0 60px rgba(200,152,10,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .map-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,80,0.02) 2px, rgba(139,119,80,0.02) 4px);
      pointer-events: none; z-index: 5;
    }

    .map-title {
      position: absolute; top: 1rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.2rem; letter-spacing: 4px;
      color: var(--gold-dark); z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 12px var(--parchment), 0 0 24px var(--parchment);
    }

    .map-subtitle {
      position: absolute; top: 2.8rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 0.5rem; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none;
      opacity: 0.6;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .location-marker {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .location-marker:hover .marker-glow {
      opacity: 1 !important;
    }
    .marker-glow {
      transition: opacity 0.4s;
    }
    .marker-pulse {
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.8; }
    }

    .location-tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: rgba(26,16,8,0.9);
      color: var(--parchment);
      padding: 0.6rem 1rem;
      border: 1px solid var(--gold-dark);
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 20;
      border-radius: 2px;
    }

    .legend {
      position: absolute; bottom: 1rem; left: 1rem;
      font-size: 0.55rem; letter-spacing: 1px;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none;
      line-height: 1.8;
    }
    .legend span {
      display: inline-block; width: 12px; height: 12px;
      margin-right: 0.3rem; vertical-align: middle;
    }
    .legend .dot-known { background: var(--gold-dark); border-radius: 50%; }
    .legend .dot-unknown { background: transparent; border: 1px solid var(--ink-dim); border-radius: 50%; }
    .legend .dot-start { background: var(--gold); border-radius: 50%; box-shadow: 0 0 6px var(--gold-glow); }

    #info-panel {
      display: none;
      position: absolute; bottom: 3rem; right: 1rem;
      width: 220px;
      background: rgba(245,236,215,0.95);
      border: 1px solid var(--border);
      padding: 1rem;
      z-index: 15;
      border-radius: 2px;
      font-size: 0.8rem;
      line-height: 1.6;
    }
    #info-panel.visible { display: block; }
    #info-panel .panel-glyph {
      font-size: 1.8rem; text-align: center;
      color: var(--gold-dark); margin-bottom: 0.3rem;
    }
    #info-panel .panel-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      color: var(--ink-mid); margin-bottom: 0.5rem;
    }
    #info-panel .panel-desc {
      font-size: 0.8rem; color: var(--ink-dim);
      margin-bottom: 0.5rem; font-style: italic;
    }
    #info-panel .panel-link {
      display: block; text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dark); text-decoration: none;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }
    #info-panel .panel-link:hover { color: var(--gold); }

    .compass {
      position: absolute; top: 1rem; right: 1rem;
      z-index: 10; pointer-events: none;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem; letter-spacing: 2px;
      color: var(--ink-dim); opacity: 0.5;
      text-align: center;
    }
    .compass .north { font-size: 0.7rem; color: var(--gold-dark); }

    @media (max-width: 600px) {
      .map-wrapper { margin: 1rem auto; }
      .legend { bottom: 0.5rem; left: 0.5rem; font-size: 0.45rem; }
      #info-panel { width: 180px; right: 0.5rem; bottom: 2rem; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">Telumë</div>
  <ul class="nav-links">
    <li><a href="readme.html">Roadmap</a></li>
    <li><a href="atlas.html" style="color:var(--gold-dark);">Atlas</a></li>
    <li><a href="seed.md">The Seed</a></li>
    <li><a href="handoff.md">Handoff</a></li>
  </ul>
</nav>

<div class="map-wrapper" id="mapWrapper">
  <div class="map-title">Telumë</div>
  <div class="map-subtitle">Loading...</div>

  <div class="compass">
    <div class="north">▲ N</div>
    <div>◄ W &nbsp; E ►</div>
    <div>S ▼</div>
  </div>

  <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" id="mapSvg">
    <text x="400" y="300" text-anchor="middle"
          font-family="'Cinzel', serif" font-size="12" fill="#8A6008" opacity="0.5">
      Loading map...
    </text>
  </svg>

  <div class="location-tooltip" id="tooltip"></div>

  <div id="info-panel">
    <div class="panel-glyph" id="panelGlyph"></div>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <a class="panel-link" id="panelLink" href="#">Read the full record →</a>
  </div>

  <div class="legend">
    <span class="dot-start"></span> Start Location<br>
    <span class="dot-known"></span> Discovered<br>
    <span class="dot-unknown"></span> Unknown<br>
    <span style="color:var(--ink-dim);">— — —</span> Road<br>
    <span style="color:#6A90A8;">~~~</span> River
  </div>
</div>

<script src="js/atlas.js"></script>
</body>
</html>
