<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telumë · The Atlas · The Bay of Ealdforn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --parchment: #F5ECD7;
      --parchment-deep: #EAD9BE;
      --ink: #1A1008;
      --ink-mid: #3A2810;
      --ink-dim: #6A5030;
      --gold: #C8980A;
      --gold-dark: #8A6008;
      --border: rgba(164,134,80,0.35);
      --ocean: #B0C8D8;
      --land: #E8DCC8;
      --land-stroke: #C8B898;
      --river: #8AB0C8;
      --surya-color: #D4784A;
      --ealdor-color: #6A9464;
      --kichigamswak-color: #4A7AB8;
      --haldorian-color: #C8980A;
    }

    body {
      background: var(--parchment-deep);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: rgba(245,236,215,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark);
    }
    .nav-links {
      display: flex; gap: 1.5rem; list-style: none; flex-wrap: wrap;
    }
    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-dim); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-dark); }

    .map-wrapper {
      position: relative;
      width: min(960px, 97vw);
      margin: 1.5rem auto;
      background: var(--parchment);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), inset 0 0 60px rgba(200,152,10,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .map-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,80,0.015) 2px, rgba(139,119,80,0.015) 4px);
      pointer-events: none; z-index: 5;
    }

    .map-title {
      position: absolute; top: 0.8rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark); z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 12px var(--parchment), 0 0 24px var(--parchment);
    }

    .map-subtitle {
      position: absolute; top: 2.3rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 0.45rem; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none; opacity: 0.6;
    }

    svg { display: block; width: 100%; height: auto; }

    .realm-label {
      font-family: 'Cinzel Decorative', serif;
      letter-spacing: 2px;
      pointer-events: none;
      text-shadow: 0 0 8px var(--parchment);
    }

    .city-marker {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .city-marker:hover .city-glow { opacity: 1; }
    .city-marker:hover .city-dot { fill: var(--gold); }

    .city-glow { opacity: 0; transition: opacity 0.4s; }
    .city-dot { transition: fill 0.3s; }

    .city-pulse { animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: rgba(26,16,8,0.9);
      color: var(--parchment);
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--gold-dark);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem; letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 20;
      border-radius: 2px;
    }

    #info-panel {
      display: none;
      position: absolute; bottom: 1.5rem; right: 1rem;
      width: 240px;
      background: rgba(245,236,215,0.95);
      border: 1px solid var(--border);
      padding: 1rem;
      z-index: 15;
      border-radius: 2px;
      font-size: 0.8rem; line-height: 1.6;
    }
    #info-panel.visible { display: block; }
    #info-panel .panel-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      color: var(--ink-mid); margin-bottom: 0.3rem;
    }
    #info-panel .panel-tier {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem; letter-spacing: 1px;
      text-align: center; text-transform: uppercase;
      color: var(--gold-dark); margin-bottom: 0.5rem;
    }
    #info-panel .panel-desc {
      font-size: 0.8rem; color: var(--ink-dim); font-style: italic;
    }

    .legend {
      position: absolute; bottom: 1rem; left: 1rem;
      font-size: 0.5rem; letter-spacing: 1px;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none; line-height: 1.8;
    }
    .legend span {
      display: inline-block; width: 10px; height: 10px;
      margin-right: 0.3rem; vertical-align: middle; border-radius: 50%;
    }

    .compass {
      position: absolute; top: 0.8rem; right: 1rem;
      z-index: 10; pointer-events: none;
      font-family: 'Cinzel', serif;
      font-size: 0.5rem; letter-spacing: 2px;
      color: var(--ink-dim); opacity: 0.5;
      text-align: center;
    }
    .compass .north { font-size: 0.65rem; color: var(--gold-dark); }

    @media (max-width: 600px) {
      .map-wrapper { margin: 0.5rem auto; }
      #info-panel { width: 180px; right: 0.3rem; bottom: 1rem; }
      .legend { bottom: 0.3rem; left: 0.3rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">Telumë</div>
  <ul class="nav-links">
    <li><a href="index.html">Index</a></li>
    <li><a href="readme.html">Roadmap</a></li>
    <li><a href="atlas.html" style="color:var(--gold-dark);">Atlas</a></li>
    <li><a href="scribe.html">Scribe</a></li>
  </ul>
</nav>

<div class="map-wrapper" id="mapWrapper">
  <div class="map-title">The Bay of Ealdforn</div>
  <div class="map-subtitle">Four Realms · Seven City-States · The Gulf of St. Lawrence</div>

  <div class="compass">
    <div class="north">▲ N</div>
    <div>◄ W &nbsp; E ►</div>
    <div>S ▼</div>
  </div>

  <!-- 
    VIEWBOX: 0 0 1000 800
    This covers from roughly:
    - West: Lake Ontario / Ottawa River (~ -80°)
    - East: Cape Breton / Atlantic (~ -59°)
    - North: Labrador coast (~ 52°)
    - South: Maine / Bay of Fundy (~ 43°)
    
    Projected as if looking down with north slightly tilted for aesthetic fit.
    Coordinates are approximate SVG positions mapped from real geography.
  -->

  <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" id="mapSvg">

    <!-- OCEAN BACKGROUND -->
    <rect x="0" y="0" width="1000" height="800" fill="#B0C8D8" opacity="0.25" />

    <!-- 
      LABRADOR / NORTH SHORE (top edge)
      Simplified northern coastline of the Gulf
    -->
    <path d="M0,80 L120,70 L250,75 L380,90 L500,100 L620,95 L740,85 L860,90 L1000,80"
          fill="none" stroke="#C8B898" stroke-width="0.5" opacity="0.3" />

    <!-- 
      NORTH SHORE OF ST. LAWRENCE
      From west (left) to east (right): Baie-Comeau region, Mingan, Anticosti
    -->
    <path d="M0,200 L100,195 L200,205 L300,215 L350,225 L400,240 L450,255 L500,260 L550,250 L620,240 L700,245 L780,255 L850,250 L1000,240"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      GASPÉ PENINSULA
      The hook at the mouth of the St. Lawrence
    -->
    <path d="M500,260 L520,290 L540,330 L530,370 L510,400 L490,380 L480,340 L470,300 L500,260 Z"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      ANTICOSTI ISLAND
      Long island in the Gulf, angled NE-SW
    -->
    <path d="M570,280 L630,270 L690,285 L720,310 L680,330 L620,320 L570,310 Z"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      MAGDALEN ISLANDS
      Small archipelago south of Anticosti
    -->
    <circle cx="710" cy="370" r="4" fill="var(--land)" stroke="var(--land-stroke)" stroke-width="0.5" />
    <circle cx="720" cy="365" r="3" fill="var(--land)" stroke="var(--land-stroke)" stroke-width="0.5" />
    <circle cx="705" cy="378" r="3.5" fill="var(--land)" stroke="var(--land-stroke)" stroke-width="0.5" />
    <circle cx="718" cy="380" r="2.5" fill="var(--land)" stroke="var(--land-stroke)" stroke-width="0.5" />

    <!-- 
      CAPE BRETON ISLAND
      Eastern island, connected to Nova Scotia by a narrow strait
    -->
    <path d="M830,400 L860,380 L890,400 L900,440 L880,480 L850,500 L820,470 L810,430 Z"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      NOVA SCOTIA PENINSULA
      South of the Gulf, connected to New Brunswick by the narrow isthmus
    -->
    <path d="M780,520 L810,500 L840,510 L870,530 L860,570 L830,590 L790,580 L760,560 L750,540 Z"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      NEW BRUNSWICK / MIRAMICHI COAST
      South shore of the Gulf, west of Nova Scotia
    -->
    <path d="M580,500 L620,490 L660,500 L700,510 L750,520 L780,520 L760,560 L720,570 L660,560 L600,540 L560,520 Z"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      MAINE COAST
      Southernmost region, Sūrya territory
    -->
    <path d="M500,600 L540,580 L580,590 L620,610 L600,650 L560,670 L500,660 L460,640 Z"
          fill="var(--land)" stroke="var(--land-stroke)" stroke-width="1" />

    <!-- 
      ST. LAWRENCE RIVER
      Flowing from west (left) to east, widening into the estuary at the Gaspé
    -->
    <path d="M0,230 L80,225 L160,228 L240,235 L320,240 L400,248 L440,252 L470,260"
          stroke="var(--river)" stroke-width="5" fill="none" opacity="0.5" />
    <path d="M0,260 L80,258 L160,260 L240,262 L320,260 L400,258 L440,260 L470,280"
          stroke="var(--river)" stroke-width="4" fill="none" opacity="0.3" />

    <!-- Estuary widening -->
    <path d="M470,260 L500,290 L520,340 L540,380"
          stroke="var(--river)" stroke-width="8" fill="none" opacity="0.35" />

    <!-- 
      MIRAMICHI RIVER
    -->
    <path d="M600,470 L610,490 L620,500"
          stroke="var(--river)" stroke-width="2" fill="none" opacity="0.4" />

    <!-- 
      BAY OF FUNDY
      Between Nova Scotia and New Brunswick/Maine
    -->
    <path d="M750,560 L740,580 L720,590 L700,595 L680,585 L670,570"
          stroke="var(--river)" stroke-width="3" fill="none" opacity="0.4" />

    <!-- 
      MANICOUAGAN RESERVOIR (The Ring)
      Circular feature on the north shore
    -->
    <circle cx="330" cy="160" r="22" fill="none" stroke="#6A9464" stroke-width="1.5" opacity="0.5" />
    <circle cx="330" cy="160" r="18" fill="none" stroke="#6A9464" stroke-width="0.5" opacity="0.3" />

    <!-- ═══════════════════════════════════════════ -->
    <!-- REALM LABELS -->
    <!-- ═══════════════════════════════════════════ -->

    <!-- Ealdor — north of St. Lawrence, central/west -->
    <text x="280" y="130" class="realm-label" font-size="12" fill="#6A9464" opacity="0.7"
          text-anchor="middle" font-weight="bold">EALDOR</text>
    <text x="280" y="148" class="realm-label" font-size="7" fill="#6A9464" opacity="0.5"
          text-anchor="middle">The Old March</text>

    <!-- Kichigamswak — west/southwest, Great Lakes region -->
    <text x="80" y="400" class="realm-label" font-size="11" fill="#4A7AB8" opacity="0.7"
          text-anchor="middle" font-weight="bold">KICHIGAMSWAK</text>
    <text x="80" y="418" class="realm-label" font-size="6.5" fill="#4A7AB8" opacity="0.5"
          text-anchor="middle">The Great Lake Ones</text>

    <!-- Haldorian Republic — Gulf / Bay of Ealdforn -->
    <text x="650" y="180" class="realm-label" font-size="11" fill="#C8980A" opacity="0.75"
          text-anchor="middle" font-weight="bold">THE HALDORIAN REPUBLIC</text>
    <text x="650" y="198" class="realm-label" font-size="6.5" fill="#C8980A" opacity="0.5"
          text-anchor="middle">Bay of Ealdforn · Seven City-States</text>

    <!-- Sūrya Samrājya — Maine / south -->
    <text x="580" y="650" class="realm-label" font-size="12" fill="#D4784A" opacity="0.7"
          text-anchor="middle" font-weight="bold">SŪRYA SAMRĀJYA</text>
    <text x="580" y="668" class="realm-label" font-size="7" fill="#D4784A" opacity="0.5"
          text-anchor="middle">Empire of the Dawnland Sun</text>

    <!-- ═══════════════════════════════════════════ -->
    <!-- HALDORIAN CITY-STATE MARKERS -->
    <!-- ═══════════════════════════════════════════ -->

    <!-- Nešatta — Anticosti Island, west end -->
    <g class="city-marker" data-id="nesatta">
      <circle cx="585" cy="295" r="14" fill="none" stroke="#C8980A" stroke-width="0.6" opacity="0.3" class="city-glow" />
      <circle cx="585" cy="295" r="4.5" fill="#C8980A" class="city-dot city-pulse" />
      <text x="585" y="280" text-anchor="middle" font-family="'Cinzel',serif" font-size="8" fill="#8A6008" opacity="0.8">Nešatta</text>
      <text x="585" y="312" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.4">Hittite · Pankus Fire</text>
    </g>

    <!-- Tihomir — Mingan Archipelago, north shore -->
    <g class="city-marker" data-id="tihomir">
      <circle cx="440" cy="248" r="12" fill="none" stroke="#C8980A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="440" cy="248" r="3.5" fill="#C8980A" class="city-dot" />
      <text x="440" y="235" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#8A6008" opacity="0.7">Tihomir</text>
      <text x="440" y="265" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.35">OCS · Witness</text>
    </g>

    <!-- Tsarnigrad — Baie-Comeau, north shore -->
    <g class="city-marker" data-id="tsarnigrad">
      <circle cx="370" cy="238" r="13" fill="none" stroke="#C8980A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="370" cy="238" r="4" fill="#C8980A" class="city-dot" />
      <text x="370" y="225" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#8A6008" opacity="0.7">Tsarnigrad</text>
      <text x="370" y="255" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.35">Old East Slavic · Fortress</text>
    </g>

    <!-- Radogost — Miramichi mouth, New Brunswick coast -->
    <g class="city-marker" data-id="radogost">
      <circle cx="600" cy="510" r="12" fill="none" stroke="#C8980A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="600" cy="510" r="3.5" fill="#C8980A" class="city-dot" />
      <text x="600" y="525" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#8A6008" opacity="0.7">Radogost</text>
      <text x="600" y="495" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.35">Old West Slavic · Trade</text>
    </g>

    <!-- Aristopol — Gaspé Peninsula tip -->
    <g class="city-marker" data-id="aristopol">
      <circle cx="515" cy="390" r="12" fill="none" stroke="#C8980A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="515" cy="390" r="3.5" fill="#C8980A" class="city-dot" />
      <text x="515" y="405" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#8A6008" opacity="0.7">Aristopol</text>
      <text x="515" y="378" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.35">Macedonian Greek · Empire-Builder</text>
    </g>

    <!-- Gordéon — Magdalen Islands -->
    <g class="city-marker" data-id="gordeon">
      <circle cx="715" cy="372" r="12" fill="none" stroke="#C8980A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="715" cy="372" r="3.5" fill="#C8980A" class="city-dot" />
      <text x="715" y="358" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#8A6008" opacity="0.7">Gordéon</text>
      <text x="715" y="390" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.35">Phrygian · Unsolvable</text>
    </g>

    <!-- Pescassa — Cape Breton Island -->
    <g class="city-marker" data-id="pescassa">
      <circle cx="860" cy="430" r="12" fill="none" stroke="#C8980A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="860" cy="430" r="3.5" fill="#C8980A" class="city-dot" />
      <text x="860" y="418" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#8A6008" opacity="0.7">Pescassa</text>
      <text x="860" y="448" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#8A6008" opacity="0.35">Epic Latin · Maritime</text>
    </g>

    <!-- ═══════════════════════════════════════════ -->
    <!-- REALM CAPITALS -->
    <!-- ═══════════════════════════════════════════ -->

    <!-- Ealdenburg — central Ealdor -->
    <g class="city-marker" data-id="ealdenburg">
      <circle cx="260" cy="155" r="12" fill="none" stroke="#6A9464" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="260" cy="155" r="4" fill="#6A9464" class="city-dot" />
      <text x="260" y="142" text-anchor="middle" font-family="'Cinzel',serif" font-size="7" fill="#6A9464" opacity="0.7">Ealdenburg</text>
    </g>

    <!-- Sūryapura — Bay of Fundy / Maine -->
    <g class="city-marker" data-id="suryapura">
      <circle cx="680" cy="580" r="13" fill="none" stroke="#D4784A" stroke-width="0.5" opacity="0.25" class="city-glow" />
      <circle cx="680" cy="580" r="4.5" fill="#D4784A" class="city-dot city-pulse" />
      <text x="680" y="595" text-anchor="middle" font-family="'Cinzel',serif" font-size="8" fill="#D4784A" opacity="0.7">Sūryapura</text>
    </g>

    <!-- The Ring — Manicouagan sacred site -->
    <g class="city-marker" data-id="ring">
      <circle cx="330" cy="160" r="20" fill="none" stroke="#6A9464" stroke-width="0.8" opacity="0.4" class="city-glow" />
      <circle cx="330" cy="160" r="4" fill="#6A9464" class="city-dot" />
      <text x="330" y="148" text-anchor="middle" font-family="'Cinzel',serif" font-size="6" fill="#6A9464" opacity="0.6">The Ring</text>
      <text x="330" y="175" text-anchor="middle" font-family="'Cinzel',serif" font-size="5" fill="#6A9464" opacity="0.35">Sacred Site</text>
    </g>

  </svg>

  <div class="tooltip" id="tooltip"></div>

  <div id="info-panel">
    <div class="panel-name" id="panelName"></div>
    <div class="panel-tier" id="panelTier"></div>
    <div class="panel-desc" id="panelDesc"></div>
  </div>

  <div class="legend">
    <span style="background:#6A9464;"></span> Ealdor · The Old March<br>
    <span style="background:#4A7AB8;"></span> Kichigamswak · Great Lake Ones<br>
    <span style="background:#C8980A;"></span> Haldorian Republic · Seven Cities<br>
    <span style="background:#D4784A;"></span> Sūrya Samrājya · Dawnland Sun<br>
  </div>
</div>

<script src="js/atlas.js"></script>
</body>
</html>
