<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telumë · The Atlas · The Bay of Ealdforn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --parchment: #F5ECD7;
      --parchment-deep: #EAD9BE;
      --ink: #1A1008;
      --ink-mid: #3A2810;
      --ink-dim: #6A5030;
      --gold: #C8980A;
      --gold-dark: #8A6008;
      --border: rgba(164,134,80,0.35);
      --ocean: #B0C8D8;
      --land: #E8DCC8;
      --land-stroke: #C8B898;
      --river: #8AB0C8;
      --surya-color: #D4784A;
      --ealdor-color: #6A9464;
      --kichigamswak-color: #4A7AB8;
      --haldorian-color: #C8980A;
    }

    body {
      background: var(--parchment-deep);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: rgba(245,236,215,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark);
    }
    .nav-links {
      display: flex; gap: 1.5rem; list-style: none; flex-wrap: wrap;
    }
    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-dim); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-dark); }

    .map-wrapper {
      position: relative;
      width: min(1000px, 97vw);
      margin: 1.5rem auto;
      background: var(--parchment);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), inset 0 0 60px rgba(200,152,10,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .map-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,80,0.015) 2px, rgba(139,119,80,0.015) 4px);
      pointer-events: none; z-index: 5;
    }

    .map-title {
      position: absolute; top: 0.8rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark); z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 12px var(--parchment), 0 0 24px var(--parchment);
    }

    .map-subtitle {
      position: absolute; top: 2.3rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 0.45rem; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none; opacity: 0.6;
    }

    svg { display: block; width: 100%; height: auto; }

    .realm-label {
      font-family: 'Cinzel Decorative', serif;
      letter-spacing: 2px;
      pointer-events: none;
      text-shadow: 0 0 8px var(--parchment);
    }

    .city-marker {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .city-marker:hover .city-glow { opacity: 1; }
    .city-marker:hover .city-dot { fill: var(--gold); }

    .city-glow { opacity: 0; transition: opacity 0.4s; }
    .city-dot { transition: fill 0.3s; }

    .city-pulse { animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: rgba(26,16,8,0.9);
      color: var(--parchment);
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--gold-dark);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem; letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 20;
      border-radius: 2px;
    }

    #info-panel {
      display: none;
      position: absolute; bottom: 1.5rem; right: 1rem;
      width: 240px;
      background: rgba(245,236,215,0.95);
      border: 1px solid var(--border);
      padding: 1rem;
      z-index: 15;
      border-radius: 2px;
      font-size: 0.8rem; line-height: 1.6;
    }
    #info-panel.visible { display: block; }
    #info-panel .panel-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      color: var(--ink-mid); margin-bottom: 0.3rem;
    }
    #info-panel .panel-tier {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem; letter-spacing: 1px;
      text-align: center; text-transform: uppercase;
      color: var(--gold-dark); margin-bottom: 0.5rem;
    }
    #info-panel .panel-desc {
      font-size: 0.8rem; color: var(--ink-dim); font-style: italic;
    }

    .legend {
      position: absolute; bottom: 1rem; left: 1rem;
      font-size: 0.5rem; letter-spacing: 1px;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none; line-height: 1.8;
    }
    .legend span {
      display: inline-block; width: 10px; height: 10px;
      margin-right: 0.3rem; vertical-align: middle; border-radius: 50%;
    }

    .compass {
      position: absolute; top: 0.8rem; right: 1rem;
      z-index: 10; pointer-events: none;
      font-family: 'Cinzel', serif;
      font-size: 0.5rem; letter-spacing: 2px;
      color: var(--ink-dim); opacity: 0.5;
      text-align: center;
    }
    .compass .north { font-size: 0.65rem; color: var(--gold-dark); }

    @media (max-width: 600px) {
      .map-wrapper { margin: 0.5rem auto; }
      #info-panel { width: 180px; right: 0.3rem; bottom: 1rem; }
      .legend { bottom: 0.3rem; left: 0.3rem; }
    }
  </style>
</head>
