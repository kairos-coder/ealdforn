<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telumë · The Atlas · The Bay of Ealdforn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --parchment: #F5ECD7;
      --parchment-deep: #EAD9BE;
      --ink: #1A1008;
      --ink-mid: #3A2810;
      --ink-dim: #6A5030;
      --gold: #C8980A;
      --gold-dark: #8A6008;
      --border: rgba(164,134,80,0.35);
      --surya-color: #D4784A;
      --ealdor-color: #6A9464;
      --kichigamswak-color: #4A7AB8;
      --haldorian-color: #C8980A;
    }

    body {
      background: var(--parchment-deep);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: rgba(245,236,215,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark);
    }
    .nav-links {
      display: flex; gap: 1.5rem; list-style: none; flex-wrap: wrap;
    }
    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-dim); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-dark); }

    .map-wrapper {
      position: relative;
      width: min(1100px, 98vw);
      margin: 1.5rem auto;
      background: var(--parchment);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), inset 0 0 60px rgba(200,152,10,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .map-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,80,0.015) 2px, rgba(139,119,80,0.015) 4px);
      pointer-events: none; z-index: 5;
    }

    .map-image {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 1;
    }

    .map-title {
      position: absolute; top: 0.8rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem; letter-spacing: 3px;
      color: var(--gold-dark); z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 12px var(--parchment), 0 0 24px var(--parchment);
    }

    .map-subtitle {
      position: absolute; top: 2.3rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 0.45rem; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none; opacity: 0.6;
    }

    .markers-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .city-marker {
      position: absolute;
      cursor: pointer;
      pointer-events: all;
      transform: translate(-50%, -50%);
      transition: all 0.3s ease;
    }
    .city-marker:hover .city-glow { opacity: 1; }
    .city-marker:hover .city-dot { fill: var(--gold); }

    .city-dot {
      display: block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin: 0 auto;
      background: var(--gold-dark);
      transition: all 0.3s;
    }
    .city-dot.pulse {
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 4px var(--gold-dark); }
      50% { box-shadow: 0 0 14px var(--gold), 0 0 24px rgba(200,152,10,0.4); }
    }

    .city-label {
      display: block;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 1px;
      color: var(--ink);
      margin-top: 2px;
      text-shadow: 0 0 4px var(--parchment), 0 0 8px var(--parchment);
      white-space: nowrap;
    }
    .city-sublabel {
      display: block;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.38rem;
      letter-spacing: 0.5px;
      color: var(--ink-dim);
      opacity: 0.6;
    }

    .realm-label {
      position: absolute;
      font-family: 'Cinzel Decorative', serif;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 4;
      text-shadow: 0 0 8px var(--parchment), 0 0 16px var(--parchment);
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      background: rgba(26,16,8,0.9);
      color: var(--parchment);
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--gold-dark);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem; letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 20;
      border-radius: 2px;
    }

    #info-panel {
      display: none;
      position: absolute; bottom: 1.5rem; right: 1rem;
      width: 220px;
      background: rgba(245,236,215,0.95);
      border: 1px solid var(--border);
      padding: 1rem;
      z-index: 15;
      border-radius: 2px;
      font-size: 0.75rem; line-height: 1.6;
    }
    #info-panel.visible { display: block; }
    #info-panel .panel-name {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      color: var(--ink-mid); margin-bottom: 0.3rem;
    }
    #info-panel .panel-tier {
      font-family: 'Cinzel', serif;
      font-size: 0.45rem; letter-spacing: 1px;
      text-align: center; text-transform: uppercase;
      color: var(--gold-dark); margin-bottom: 0.5rem;
    }
    #info-panel .panel-desc {
      font-size: 0.72rem; color: var(--ink-dim); font-style: italic;
    }

    .legend {
      position: absolute; bottom: 1rem; left: 1rem;
      font-size: 0.45rem; letter-spacing: 1px;
      color: var(--ink-dim); z-index: 10;
      pointer-events: none; line-height: 1.8;
    }
    .legend span {
      display: inline-block; width: 8px; height: 8px;
      margin-right: 0.3rem; vertical-align: middle; border-radius: 50%;
    }

    .compass {
      position: absolute; top: 0.8rem; right: 1rem;
      z-index: 10; pointer-events: none;
      font-family: 'Cinzel', serif;
      font-size: 0.45rem; letter-spacing: 2px;
      color: var(--ink-dim); opacity: 0.5;
      text-align: center;
    }
    .compass .north { font-size: 0.6rem; color: var(--gold-dark); }

    @media (max-width: 600px) {
      .map-wrapper { margin: 0.5rem auto; }
      #info-panel { width: 180px; right: 0.3rem; bottom: 1rem; }
      .legend { bottom: 0.3rem; left: 0.3rem; }
      .city-label { font-size: 0.4rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">Telumë</div>
  <ul class="nav-links">
    <li><a href="index.html">Index</a></li>
    <li><a href="readme.html">Roadmap</a></li>
    <li><a href="atlas.html" style="color:var(--gold-dark);">Atlas</a></li>
    <li><a href="scribe.html">Scribe</a></li>
  </ul>
</nav>

<div class="map-wrapper" id="mapWrapper">
  <div class="map-title">The Bay of Ealdforn</div>
  <div class="map-subtitle">Four Realms · Seven City-States · The Gulf of St. Lawrence</div>

  <div class="compass">
    <div class="north">▲ N</div>
    <div>◄ W &nbsp; E ►</div>
    <div>S ▼</div>
  </div>

  <!-- Base map image -->
  <img src="images/atlas.png" alt="The Bay of Ealdforn" class="map-image" id="mapImage" />

  <!-- Realm labels -->
  <div class="realm-label" style="top:25%;left:32%;font-size:0.8rem;color:#6A9464;opacity:0.7;" data-realm="ealdor">EALDOR</div>
  <div class="realm-label" style="top:38%;left:15%;font-size:0.75rem;color:#4A7AB8;opacity:0.7;" data-realm="kichigamswak">KICHIGAMSWAK</div>
  <div class="realm-label" style="top:30%;left:55%;font-size:0.75rem;color:#C8980A;opacity:0.75;" data-realm="haldorian">HALDORIAN REPUBLIC</div>
  <div class="realm-label" style="top:58%;left:60%;font-size:0.8rem;color:#D4784A;opacity:0.7;" data-realm="surya">SŪRYA SAMRĀJYA</div>

  <!-- City markers layer -->
  <div class="markers-layer" id="markersLayer">
    <!-- Positions set by JS after image loads -->
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <!-- Info panel -->
  <div id="info-panel">
    <div class="panel-name" id="panelName"></div>
    <div class="panel-tier" id="panelTier"></div>
    <div class="panel-desc" id="panelDesc"></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span style="background:#6A9464;"></span> Ealdor<br>
    <span style="background:#4A7AB8;"></span> Kichigamswak<br>
    <span style="background:#C8980A;"></span> Haldorian Republic<br>
    <span style="background:#D4784A;"></span> Sūrya Samrājya
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// ATLAS MARKER ENGINE · CALIBRATED
// Positions hand-placed via calibrate.html
// ═══════════════════════════════════════════════════════════════

// Calibrated city data — x/y are percentages of image dimensions
// Replace the CITIES array in atlas.html with this calibrated data:
const CITIES = [
  { id: 'nesatta', name: 'Nešatta', realm: 'haldorian', x: 75.1, y: 31.83 },
  { id: 'tihomir', name: 'Tihomir', realm: 'haldorian', x: 78.01, y: 47.89 },
  { id: 'tsarnigrad', name: 'Tsarnigrad', realm: 'haldorian', x: 64.74, y: 38.68 },
  { id: 'radogost', name: 'Radogost', realm: 'haldorian', x: 57.64, y: 40.08 },
  { id: 'aristopol', name: 'Aristopol', realm: 'haldorian', x: 56.92, y: 51.67 },
  { id: 'gordeon', name: 'Gordéon', realm: 'haldorian', x: 71.92, y: 37.08 },
  { id: 'pescassa', name: 'Pescassa', realm: 'haldorian', x: 96.1, y: 46.87 },
  { id: 'ealdenburg', name: 'Ealdenburg', realm: 'ealdor', x: 51.19, y: 60.27 },
  { id: 'suryapura', name: 'Sūryapura', realm: 'surya', x: 62.19, y: 67.87 },
  { id: 'ring', name: 'The Ring', realm: 'ealdor', x: 62.64, y: 17.29 },
  { id: 'kichigamswak', name: 'Kichigamswak', realm: 'kichigamswak', x: 38.01, y: 77.66 },
];

const CITY_INFO = {
  nesatta:    { desc: 'Oldest of the seven. Archive city. Nearly abandoned. Holds the glyph archive that could break every other kingdom\'s origin story. The Pankus assembly meets here every seven years.' },
  tihomir:    { desc: 'Monastery on the Magdalen Islands. Does not vote in the Pankus. Keeps the written record. Bogumil transcribed the Nešatta Codex here. Brother Eadwine compiled The Lost Tales here.' },
  tsarnigrad: { desc: 'The dark fortress on the south shore. Almost-monarchy. Greatest internal threat to the Pankus covenant. The city that effaced and recarved the "no king" inscription.' },
  radogost:   { desc: 'Glad host at the Saguenay fjord. Inland gateway to the river routes. Where the Pankus gets its grain. The most welcoming of the seven — and the most vulnerable.' },
  aristopol:  { desc: '"The city of the best." Empire-builder on the cliffs of Quebec. Perpetually proposes a hegemon for the Pankus. Exhausting and indispensable.' },
  gordeon:    { desc: 'Old money. Old gods. The unsolvable city tucked into Chaleur Bay. The Gordian knot as political theology. Doesn\'t explain itself.' },
  pescassa:   { desc: 'The maritime outlier at St. John\'s, Newfoundland. Epic Latin — the language of the net and the oar. Arrived in boats. Never left. The easternmost city in the world.' },
  ealdenburg: { desc: 'The Old Fort. Island city at the confluence of rivers. Where the Witenagemot meets to choose the king. The Ring lies to the north.' },
  suryapura:  { desc: 'Temple complex of golden spires on Mount Desert Island. The Sun-King resides here. The Trilingual Codex is kept in the Agnihotra temple. The Dawnstone faces the sunrise.' },
  kichigamswak: { desc: 'The heart of the confederacy at the Niagara junction. No fixed capital — the council fire moves between the clan-seats. The Great Law predates the Tower.' },
  ring:       { desc: 'The meteor crater where Hengist swore the first oath. Where Ymir hit the ground. Where the oldest ogham circle stands. Tended by the Tuatha dé Gwalenn.' }
};

// ── BUILD MARKERS ────────────────────────────────────────────
function buildMarkers() {
  const img = document.getElementById('mapImage');
  const layer = document.getElementById('markersLayer');
  if (!img || !layer) return;

  if (!img.complete) {
    img.addEventListener('load', buildMarkers);
    return;
  }

  layer.innerHTML = '';

  CITIES.forEach(city => {
    const marker = document.createElement('div');
    marker.className = 'city-marker';
    marker.style.left = city.x + '%';
    marker.style.top = city.y + '%';
    marker.setAttribute('data-id', city.id);

    const dot = document.createElement('div');
    dot.className = 'city-dot' + (city.pulse ? ' pulse' : '');
    dot.style.backgroundColor = 
      city.realm === 'ealdor' ? '#6A9464' :
      city.realm === 'kichigamswak' ? '#4A7AB8' :
      city.realm === 'surya' ? '#D4784A' : '#C8980A';
    marker.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'city-label';
    label.textContent = city.name;
    marker.appendChild(label);

    const sublabel = document.createElement('span');
    sublabel.className = 'city-sublabel';
    sublabel.textContent = city.tier.split('·')[0].trim();
    marker.appendChild(sublabel);

    marker.addEventListener('click', () => showInfo(city.id));
    marker.addEventListener('mouseenter', (e) => showTooltip(e, city.name));
    marker.addEventListener('mousemove', moveTooltip);
    marker.addEventListener('mouseleave', hideTooltip);

    layer.appendChild(marker);
  });
}

// ── TOOLTIP ──────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(e, name) {
  tooltip.textContent = name;
  tooltip.style.opacity = '1';
}

function moveTooltip(e) {
  const wrapper = document.getElementById('mapWrapper');
  const rect = wrapper.getBoundingClientRect();
  tooltip.style.left = (e.clientX - rect.left + 16) + 'px';
  tooltip.style.top  = (e.clientY - rect.top - 36) + 'px';
}

function hideTooltip() {
  tooltip.style.opacity = '0';
}

// ── INFO PANEL ───────────────────────────────────────────────
function showInfo(id) {
  const city = CITIES.find(c => c.id === id);
  if (!city) return;
  const info = CITY_INFO[id] || { desc: 'Location data not yet recorded.' };
  const panel = document.getElementById('info-panel');
  document.getElementById('panelName').textContent = city.name;
  document.getElementById('panelTier').textContent = city.tier;
  document.getElementById('panelDesc').textContent = info.desc;
  panel.classList.add('visible');
}

document.addEventListener('click', (e) => {
  const panel = document.getElementById('info-panel');
  if (!panel.contains(e.target) && !e.target.closest('.city-marker')) {
    panel.classList.remove('visible');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('info-panel').classList.remove('visible');
  }
});

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', buildMarkers);
window.addEventListener('resize', buildMarkers);
</script>
</body>
</html>
