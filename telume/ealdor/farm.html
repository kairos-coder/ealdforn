<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ealdor Farm · Radish Fields</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0a0806; --deep: #1a1410;
            --earth: #3d2f1f; --soil: #4a3520;
            --wood: #3d2b1f; --wood-light: #5c3a1f;
            --stone: #4a3f35; --stone-dark: #3d362f;
            --wheat: #c8a848; --wheat-pale: #e8c878;
            --radish-red: #c84444; --carrot: #e87830; --cabbage: #6a8a4a;
            --sky: #c8d8e8; --gold: #b8860b; --parchment: #f4e4c1;
            --water: #5a8ab8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Georgia','Times New Roman',serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(200,168,72,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(10,8,6,0.98) 0%, transparent 50%);
        }

        #farm-field {
            position: relative; width: 900px; max-width: 98vw;
            height: 730px; margin: 0 auto;
            overflow: hidden;
            background: linear-gradient(180deg, #c8d8e8 0%, #e8f0f8 18%, #3d2f1f 18%, #4a3520 100%);
            border-left: 4px solid var(--stone-dark);
            border-right: 4px solid var(--stone-dark);
            box-shadow: 0 0 120px rgba(0,0,0,0.6), 0 0 240px rgba(0,0,0,0.3);
        }
        @media (max-width: 920px) {
            #farm-field { width: 98vw; height: calc(98vw * 0.81); }
        }

        .zone { cursor: pointer; transition: filter 0.25s, transform 0.25s; }
        .zone:hover { filter: brightness(1.3); z-index: 50 !important; }
        .zone:active { transform: scale(0.94); transition: transform 0.1s; }

        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,6,0.94); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.5rem 1.2rem;
            font-family: 'Georgia',serif; font-size: 0.78rem;
            z-index: 200; opacity: 0; transition: opacity 0.35s;
            pointer-events: none; text-align: center; max-width: 420px; line-height: 1.4;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5); white-space: pre-line;
        }
        #toast.show { opacity: 1; }

        @keyframes scarecrowBob { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
        @keyframes wellGlow { 0%,100%{box-shadow:0 0 4px rgba(90,138,184,0.2)} 50%{box-shadow:0 0 12px rgba(90,138,184,0.5)} }
        @keyframes sparkFade { 0%{transform:scale(0.5);opacity:1} 100%{transform:scale(2.5);opacity:0} }
        @keyframes birdGlide { 0%{transform:translate(0,0)} 50%{transform:translate(60px,-8px)} 100%{transform:translate(120px,0)} }
        @keyframes canopySway { 0%,100%{transform:translateX(0)} 50%{transform:translateX(2px)} }
    </style>
</head>
<body>

    <div id="farm-field"></div>
    <div id="toast"></div>

    <script src="js/font-mason.js"></script>
    <script>
    /*
     * ═══════════════════════════════════════════════════════
     * THE EALDOR FARM
     * Loads farm.json → builds with FontMason v2
     * Trees, crops, buildings, tools, well, paths.
     * ═══════════════════════════════════════════════════════
     */

    const DEFAULT_STATE = {
        year: 3450, season: 0,
        farmVisits: 0,
        waterDrawn: 0,
        playerResources: { Stone: 4, Timber: 3, Grain: 5, Iron: 2, Salt: 2, Cloth: 3, Radishes: 0, Carrots: 0, Cabbages: 0 },
    };
    let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

    function loadState() {
        const raw = localStorage.getItem('ealdor_save');
        if (!raw) return false;
        try {
            const saved = JSON.parse(raw);
            state = { ...DEFAULT_STATE, ...saved };
            if (!state.playerResources) state.playerResources = { ...DEFAULT_STATE.playerResources };
            ['Radishes','Carrots','Cabbages','Grain'].forEach(r => {
                if (state.playerResources[r] === undefined) state.playerResources[r] = 0;
            });
            return true;
        } catch(e) { return false; }
    }
    function saveState() { localStorage.setItem('ealdor_save', JSON.stringify(state)); }

    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(msg, d = 2800) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), d);
    }

    function resolveTemplate(template) {
        if (Array.isArray(template)) {
            return template[Math.floor(Math.random() * template.length)];
        }
        if (typeof template !== 'string') return template;
        return template.replace(/\$(\w+)/g, (_, key) => {
            if (state.playerResources && state.playerResources[key] !== undefined) return state.playerResources[key];
            if (state[key] !== undefined) return state[key];
            return '0';
        });
    }

    function resolveConditionalToast(template) {
        const resolved = template.replace(/\$(\w+)/g, (_, key) => {
            if (state.playerResources && state.playerResources[key] !== undefined) return state.playerResources[key];
            if (state[key] !== undefined) return state[key];
            return '0';
        });
        try {
            return resolved.replace(/(\d+)\s*>\s*(\d+)\s*\?\s*'([^']+)'\s*:\s*'([^']+)'/g, (_, a, b, t, f) => {
                return parseInt(a) > parseInt(b) ? t : f;
            });
        } catch(e) { return resolved; }
    }

    function resolveMaterial(obj, farmData) {
        const matName = obj.material;
        if (!matName) return FontMason.mat('cyclopean');
        if (farmData.materials && farmData.materials[matName]) {
            const m = farmData.materials[matName];
            return {
                chars: m.characters || m.chars || ['▓'],
                textColor: m.textColor || '#5c4f42',
                mortarColor: m.mortarColor || '#3a3028',
                fontSize: m.fontSize || 28,
                lineHeight: m.lineHeight || 0.5,
                letterSpacing: m.letterSpacing || -2,
                fontFamily: m.fontFamily || 'monospace',
                weathering: m.weathering || 0.1,
            };
        }
        if (FontMason.MATERIALS[matName]) return FontMason.mat(matName);
        return {
            chars: obj.chars || ['▓'],
            textColor: obj.textColor || '#5c4f42',
            mortarColor: obj.mortarColor || '#3a3028',
            fontSize: obj.fontSize || 28,
            lineHeight: 0.5,
            letterSpacing: -2,
            fontFamily: 'monospace',
            weathering: 0.1,
        };
    }

    // ═══════════════════════════════════
    // BUILD TREE FROM JSON
    // ═══════════════════════════════════

    function buildTree(m, container, tree) {
        const tx = tree.position.x;
        const ty = tree.position.y;
        const trunk = tree.trunk;

        const trunkEl = m.buildPillar({
            chars: trunk.chars,
            textColor: trunk.textColor,
            mortarColor: '#2a1f15',
            fontSize: Math.max(10, trunk.width * 0.75),
            fontFamily: 'monospace',
            x: tx + (trunk.offsetX || 0),
            y: ty,
            width: trunk.width,
            height: trunk.height,
            z: 4
        });
        if (trunkEl) {
            trunkEl.style.animation = `canopySway ${5 + Math.random() * 4}s ease-in-out infinite`;
        }

        let prevBottom = ty;
        const canopy = tree.canopy || [];
        canopy.forEach((layer, i) => {
            const lx = tx + (layer.offsetX || 0);
            const ly = i === 0
                ? ty + (layer.offsetY || 0)
                : prevBottom - layer.height + (layer.overlap || 15);

            const el = m.buildWall({
                chars: layer.chars,
                textColor: layer.textColor,
                mortarColor: layer.mortarColor || 'transparent',
                fontSize: layer.fontSize,
                lineHeight: layer.lineHeight || 0.42,
                letterSpacing: layer.letterSpacing || -2,
                fontFamily: layer.fontFamily || 'monospace',
                x: lx, y: ly,
                width: layer.width,
                height: layer.height,
                z: layer.z || 5,
                weathering: layer.weathering || 0.05
            });
            if (el) {
                el.style.animation = `canopySway ${4 + Math.random() * 3}s ease-in-out infinite`;
            }
            prevBottom = ly;
        });

        if (tree.interaction) {
            const iz = tree.interaction.zone;
            const zone = document.createElement('div');
            zone.className = 'zone';
            zone.title = tree.interaction.label || '';
            zone.style.cssText = `position:absolute;left:${iz.x}px;top:${iz.y}px;width:${iz.width}px;height:${iz.height}px;z-index:20;`;
            zone.addEventListener('click', () => {
                const msg = resolveTemplate(tree.interaction.toast);
                toast(msg);
            });
            container.appendChild(zone);
        }
    }

    // ═══════════════════════════════════
    // BUILD OBJECT FROM JSON
    // ═══════════════════════════════════

    function buildObject(m, container, obj, farmData) {
        const mat = resolveMaterial(obj, farmData);
        const pos = obj.position || {};
        const dim = obj.dimensions || {};

        switch (obj.build) {
            case 'wall': {
                const wallConfig = {
                    ...mat,
                    x: pos.x, y: pos.y,
                    width: dim.width, height: dim.height,
                    z: pos.z || 1,
                    weathering: obj.weathering !== undefined ? obj.weathering : (mat.weathering || 0.05),
                    openings: obj.openings || null,
                };
                if (obj.shape) wallConfig.shape = obj.shape;
                if (obj.chars) wallConfig.chars = obj.chars;
                if (obj.textColor) wallConfig.textColor = obj.textColor;
                if (obj.mortarColor) wallConfig.mortarColor = obj.mortarColor;
                if (obj.fontSize) wallConfig.fontSize = obj.fontSize;
                m.buildWall(wallConfig);
                break;
            }
            case 'pillar': {
                m.buildPillar({
                    ...mat,
                    x: pos.x, y: pos.y,
                    width: dim.width, height: dim.height,
                    z: pos.z || 2,
                    chars: obj.chars || mat.chars || ['╎'],
                    fontSize: obj.fontSize || 14,
                    capital: obj.capital || false,
                    capitalHeight: obj.capitalHeight || 0,
                });
                break;
            }
            case 'pillars': {
                for (let i = 0; i < (obj.count || 1); i++) {
                    m.buildPillar({
                        ...mat,
                        x: (obj.startX || 0) + i * (obj.spacing || 80),
                        y: pos.y,
                        width: dim.width, height: dim.height,
                        z: pos.z || 2,
                        chars: obj.chars || ['╎'],
                        fontSize: obj.fontSize || 14,
                    });
                }
                break;
            }
            case 'floor': {
                m.buildFloor({
                    ...mat,
                    x: pos.x, y: pos.y,
                    width: dim.width, height: dim.height,
                    z: pos.z || 0,
                    perspectiveStrength: obj.perspectiveStrength || 8,
                });
                break;
            }
        }

        // Nested components
        if (obj.components) {
            obj.components.forEach(comp => buildComponent(m, container, comp, obj, farmData));
        }

        // Interaction zone
        if (obj.interaction) {
            const iz = obj.interaction.zone || { x: pos.x, y: pos.y, width: dim.width, height: dim.height };
            const zone = document.createElement('div');
            zone.className = 'zone';
            zone.title = obj.interaction.label || obj.name || '';
            zone.style.cssText = `position:absolute;left:${iz.x}px;top:${iz.y}px;width:${iz.width}px;height:${iz.height}px;z-index:20;`;

            zone.addEventListener('click', () => {
                if (obj.interaction.transition) {
                    saveState();
                    setTimeout(() => { window.location.href = obj.interaction.transition; }, 600);
                    return;
                }
                if (obj.interaction.action === 'drawWater') {
                    state.waterDrawn = (state.waterDrawn || 0) + 1;
                    saveState();
                }
                let msg = '';
                if (obj.interaction.toast_success) {
                    msg = resolveTemplate(obj.interaction.toast_success) + `\n\nWater drawn: ${state.waterDrawn}`;
                } else if (obj.interaction.toast) {
                    const t = resolveTemplate(obj.interaction.toast);
                    msg = resolveConditionalToast(typeof t === 'string' ? t : obj.interaction.toast);
                    if (typeof msg === 'string') msg = resolveConditionalToast(msg);
                }
                if (msg) toast(msg);
            });

            container.appendChild(zone);
        }
    }

    function buildComponent(m, container, comp, parent, farmData) {
        const pos = comp.position || {};
        const dim = comp.dimensions || {};
        const mat = comp.material ? resolveMaterial({ material: comp.material, chars: comp.chars, textColor: comp.textColor, mortarColor: comp.mortarColor, fontSize: comp.fontSize }, farmData) : {};

        switch (comp.type) {
            case 'wall': {
                const wc = {
                    ...mat,
                    x: (parent.position?.x || 0) + (pos.x || 0),
                    y: (parent.position?.y || 0) + (pos.y || 0),
                    width: dim.width, height: dim.height,
                    z: pos.z || 5,
                };
                if (comp.openings) wc.openings = comp.openings;
                if (comp.shape) wc.shape = comp.shape;
                m.buildWall(wc);
                break;
            }
            case 'pillar': {
                m.buildPillar({
                    ...mat,
                    x: (parent.position?.x || 0) + (pos.x || 0),
                    y: (parent.position?.y || 0) + (pos.y || 0),
                    width: dim.width, height: dim.height,
                    z: pos.z || 6,
                    chars: comp.chars || ['╎'],
                    fontSize: comp.fontSize || 10,
                });
                break;
            }
            case 'inscription': {
                m.buildInscription({
                    text: comp.text || '',
                    x: (parent.position?.x || 0) + (pos.x || 0),
                    y: (parent.position?.y || 0) + (pos.y || 0),
                    fontSize: comp.fontSize || 7,
                    color: comp.color || '#8b7d6b',
                    fontFamily: comp.fontFamily || "'Cinzel',serif",
                    z: pos.z || 7,
                });
                break;
            }
            case 'circle': {
                const el = document.createElement('div');
                el.style.cssText = `
                    position: absolute;
                    left: ${(parent.position?.x || 0) + (pos.x || 0)}px;
                    top: ${(parent.position?.y || 0) + (pos.y || 0)}px;
                    width: ${(comp.radius || 14) * 2}px;
                    height: ${(comp.radius || 14) * 2}px;
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: ${pos.z || 7};
                    ${comp.style?.background ? `background: ${comp.style.background};` : ''}
                    ${comp.style?.animation ? `animation: ${comp.style.animation};` : ''}
                `;
                container.appendChild(el);
                break;
            }
        }
    }

    // ═══════════════════════════════════
    // BUILD FARM FROM JSON
    // ═══════════════════════════════════

    async function buildFarm() {
        const container = document.getElementById('farm-field');
        container.innerHTML = '';

        let farmData;
        try {
            const resp = await fetch('json/farm.json');
            if (!resp.ok) throw new Error('farm.json not found');
            farmData = await resp.json();
        } catch(e) {
            toast('Farm data unavailable. The fields lie fallow.');
            return;
        }

        const m = new FontMason('farm-field');

        // ── BIRDS ──
        if (farmData.scene?.background?.birds) {
            const birds = farmData.scene.background.birds;
            for (let i = 0; i < birds.count; i++) {
                const bird = document.createElement('div');
                bird.style.cssText = `position:absolute;left:${80+i*200}px;top:${15+i*15}px;color:${birds.color};font-size:8px;font-family:Georgia,serif;pointer-events:none;z-index:1;animation:birdGlide ${6+i*2}s ease-in-out ${i*1.5}s infinite;`;
                bird.textContent = birds.glyph;
                container.appendChild(bird);
            }
        }

        // ── BUILD OBJECTS ──
        (farmData.objects || []).forEach(obj => buildObject(m, container, obj, farmData));

        // ── BUILD CROPS ──
        (farmData.crops || []).forEach(crop => {
            m.buildInscription({
                text: crop.name.toUpperCase(),
                x: crop.row.x - 5,
                y: crop.row.y - 16,
                fontSize: 5,
                color: 'rgba(244,228,193,0.35)',
                fontFamily: "'Cinzel',serif",
                z: 6
            });

            for (let i = 0; i < crop.row.count; i++) {
                const px = crop.row.x + i * crop.row.spacing;
                const py = crop.row.y + Math.sin(i * 0.7) * 4;

                m.buildInscription({
                    text: crop.glyph,
                    x: px, y: py,
                    fontSize: 12 + Math.random() * 4,
                    color: crop.color,
                    fontFamily: "'Georgia',serif",
                    z: 5
                });

                const cropZone = document.createElement('div');
                cropZone.className = 'zone';
                cropZone.title = `Harvest ${crop.name.toLowerCase().slice(0, -1)}`;
                cropZone.style.cssText = `position:absolute;left:${px-8}px;top:${py-6}px;width:20px;height:20px;z-index:20;`;
                cropZone.addEventListener('click', () => {
                    const resource = crop.resource;
                    state.playerResources[resource] = (state.playerResources[resource] || 0) + 1;
                    const whisper = resolveTemplate(crop.whispers);
                    toast(`${crop.glyph} ${whisper}\n\nTotal ${crop.name.toLowerCase()}: ${state.playerResources[resource]}`);
                    saveState();
                });
                container.appendChild(cropZone);
            }
        });

        // ── BUILD TREES ──
        (farmData.trees || []).forEach(tree => buildTree(m, container, tree));

        // ── LIGHTS ──
        if (farmData.atmosphere?.lights) {
            farmData.atmosphere.lights.forEach(l => {
                m.buildLight({ color: l.color, radius: l.radius, x: l.x, y: l.y, pulse: l.pulse, z: l.z });
            });
        }

        // ── PARTICLES ──
        if (farmData.atmosphere?.particles) {
            const p = farmData.atmosphere.particles;
            m.spawnParticles({
                type: p.type,
                count: p.count,
                color: p.color,
                minSize: p.minSize,
                maxSize: p.maxSize,
                zone: { x: p.zone.x, y: p.zone.y, w: p.zone.width, h: p.zone.height },
                duration: p.duration,
                z: p.z
            });
        }

        return m;
    }

    // ═══════════════════════════════════
    // INIT
    // ═══════════════════════════════════

    async function init() {
        const loaded = loadState();
        if (!loaded) saveState();

        state.farmVisits = (state.farmVisits || 0) + 1;
        saveState();

        const params = new URLSearchParams(window.location.search);
        if (params.get('from')) {
            toast(`🌾 You arrive at the farm from the ${params.get('from')}. The fields stretch before you.`);
            window.history.replaceState({}, '', 'farm.html');
        } else {
            const welcome = state.farmVisits > 1
                ? '🌾 The farm remembers you. The radishes have grown. The trees have thickened.'
                : '🌾 The Ealdor Farm. Rich soil. Ready crops. Oak and pine watch over the fields.';
            toast(welcome);
        }

        await buildFarm();

        document.addEventListener('click', (e) => {
            if (Math.random() > 0.75 && !e.target.closest('.zone')) {
                const spark = document.createElement('div');
                spark.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:3px;height:3px;background:#d4af37;border-radius:50%;box-shadow:0 0 10px #d4af37;pointer-events:none;z-index:150;animation:sparkFade 1.2s ease-out forwards;`;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1300);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.target.closest('input,textarea')) {
                e.preventDefault();
                const radish = document.querySelector('[title="Harvest radish"]');
                if (radish) radish.click();
            }
        });
    }

    init();
    </script>
</body>
</html>
