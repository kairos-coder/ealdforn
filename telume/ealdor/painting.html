    <style>
        :root {
            --void: #0a0806;
            --gold: #b8860b;
            --parchment: #f4e4c1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Georgia','Times New Roman',serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #gallery {
            display: flex; flex-direction: column; align-items: center; gap: 2rem;
            padding: 2rem 1rem; width: 100%; max-width: 1000px;
        }

        .painting-frame {
            position: relative;
            border: 8px solid #2a2520;
            box-shadow: 0 0 60px rgba(0,0,0,0.7), 0 0 120px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.4);
            background: #f4e4c1;
            overflow: hidden;
        }

        .painting-label {
            text-align: center;
            font-family: 'Cinzel',serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #8b7d6b;
            margin-top: 0.5rem;
        }

        .painting-caption {
            text-align: center;
            font-family: 'Georgia',serif;
            font-style: italic;
            font-size: 0.7rem;
            color: rgba(244,228,193,0.5);
            margin-top: 0.2rem;
        }

        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,6,0.94); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.5rem 1.2rem;
            font-family: 'Georgia',serif; font-size: 0.78rem;
            z-index: 200; opacity: 0; transition: opacity 0.35s;
            pointer-events: none; text-align: center; max-width: 420px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        #toast.show { opacity: 1; }
    </style>
</head>

    // ═══════════════════════════════════
    // RENDER A PAINTING
    // ═══════════════════════════════════

    function renderPainting(painting) {
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexDirection = 'column';
        container.style.alignItems = 'center';

        // Create a unique container for this painting's Mason
        const frameId = `painting-${painting.id}`;
        const frame = document.createElement('div');
        frame.id = frameId;
        frame.className = 'painting-frame';
        frame.style.width = painting.width + 'px';
        frame.style.height = painting.height + 'px';
        container.appendChild(frame);

        // Label
        const label = document.createElement('div');
        label.className = 'painting-label';
        label.textContent = painting.title;
        container.appendChild(label);

        // Caption
        const caption = document.createElement('div');
        caption.className = 'painting-caption';
        caption.textContent = painting.caption;
        container.appendChild(caption);

        // Build with Mason
        const m = new FontMason(frameId);

        painting.layers.forEach((layer, i) => {
            const config = {
                chars: layer.chars,
                textColor: layer.textColor,
                mortarColor: layer.mortarColor || 'transparent',
                fontSize: layer.fontSize || 16,
                lineHeight: layer.lineHeight || 0.5,
                letterSpacing: layer.letterSpacing || 0,
                fontFamily: layer.fontFamily || "'Georgia','Times New Roman',serif",
                x: layer.x || 0,
                y: layer.y || 0,
                width: layer.width || painting.width,
                height: layer.height || painting.height,
                z: i + 1,
                weathering: 0,
                highlightColor: layer.highlightColor || 'rgba(255,255,255,0.02)',
                shadowColor: layer.shadowColor || 'rgba(0,0,0,0.05)',
            };
            m.buildWall(config);
        });

        return container;
    }

    // ═══════════════════════════════════
    // INIT
    // ═══════════════════════════════════

    function init() {

        gallery.appendChild(subtitle);

        // Render each painting
        PAINTINGS.forEach(painting => {
            gallery.appendChild(renderPainting(painting));
        });

        // Footer
