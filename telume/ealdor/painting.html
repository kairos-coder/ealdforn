<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Typographic Gallery · Ealdor</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0a0806; --gold: #b8860b; --parchment: #f4e4c1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Georgia','Times New Roman',serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(200,168,72,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(10,8,6,0.98) 0%, transparent 50%);
        }

        #gallery {
            display: flex; flex-direction: column; align-items: center; gap: 2.5rem;
            padding: 2rem 1rem; width: 100%; max-width: 1000px;
        }

        .painting-wrapper {
            display: flex; flex-direction: column; align-items: center;
        }

        .painting-frame {
            position: relative;
            border: 8px solid #2a2520;
            box-shadow: 0 0 60px rgba(0,0,0,0.7), 0 0 120px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.4);
            background: #f4e4c1;
            overflow: hidden;
        }

        .painting-label {
            text-align: center;
            font-family: 'Cinzel',serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #8b7d6b;
            margin-top: 0.5rem;
        }

        .painting-caption {
            text-align: center;
            font-family: 'Georgia',serif;
            font-style: italic;
            font-size: 0.7rem;
            color: rgba(244,228,193,0.5);
            margin-top: 0.2rem;
        }

        .nav-path {
            text-align: center;
            font-family: 'Cinzel',serif;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(139,125,107,0.4);
            margin-top: 1rem;
            padding: 1rem;
            border-top: 1px solid rgba(139,125,107,0.1);
            width: 100%;
        }

        .nav-path .zone {
            cursor: pointer;
            transition: color 0.3s;
            color: #8b7d6b;
        }
        .nav-path .zone:hover {
            color: #b8860b;
        }

        @keyframes sparkFade {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="gallery"></div>

    <script src="js/font-mason.js"></script>
    <script src="js/scene-loader.js"></script>
    <script>
    /*
     * ═══════════════════════════════════════════════════════
     * THE TYPOGRAPHIC GALLERY · Ealdor
     * Paintings as SceneLoader scenes.
     * Each painting is a JSON file. SceneLoader builds them.
     * FontMason is the brush. Characters are the pigment.
     * ═══════════════════════════════════════════════════════
     */

    const PAINTING_MANIFEST = [
        {
            id: "starry-night",
            scene: "json/scenes/painting-starry-night.json",
            label: "Starry Night Over the Fjord",
            caption: "Oil on typographic canvas · The sky remembers every star"
        },
        {
            id: "harbor-dawn",
            scene: "json/scenes/painting-harbor-dawn.json",
            label: "Harbor at Dawn",
            caption: "Watercolor on typographic paper · The ships wait for the tide"
        },
        {
            id: "radish-still-life",
            scene: "json/scenes/painting-radish-still-life.json",
            label: "Still Life with Radishes",
            caption: "Charcoal and earth on typographic paper · The humble root"
        }
    ];

    // ═══════════════════════════════════
    // RENDER A PAINTING VIA SCENE LOADER
    // ═══════════════════════════════════

    async function renderPainting(paintingDef) {
        const wrapper = document.createElement('div');
        wrapper.className = 'painting-wrapper';

        // Create container for SceneLoader
        const containerId = `painting-${paintingDef.id}`;
        const container = document.createElement('div');
        container.id = containerId;
        container.className = 'painting-frame';
        wrapper.appendChild(container);

        // Label
        const label = document.createElement('div');
        label.className = 'painting-label';
        label.textContent = paintingDef.label;
        wrapper.appendChild(label);

        // Caption
        const caption = document.createElement('div');
        caption.className = 'painting-caption';
        caption.textContent = paintingDef.caption;
        wrapper.appendChild(caption);

        // Load scene via SceneLoader
        const loader = new SceneLoader(containerId);
        try {
            await loader.load(paintingDef.scene);
        } catch(e) {
            container.innerHTML = `<div style="color:#8b7d6b;text-align:center;padding:2rem;font-style:italic;">Painting unavailable.<br>The canvas is blank.</div>`;
        }

        return wrapper;
    }

    // ═══════════════════════════════════
    // INIT
    // ═══════════════════════════════════

    async function init() {
        const gallery = document.getElementById('gallery');

        // Title
        const title = document.createElement('div');
        title.style.cssText = 'text-align:center;font-family:Cinzel,serif;font-size:1.4rem;letter-spacing:6px;color:#b8860b;margin-bottom:0.5rem;text-shadow:0 0 20px rgba(184,134,11,0.3);';
        title.textContent = 'THE TYPOGRAPHIC GALLERY';
        gallery.appendChild(title);

        const subtitle = document.createElement('div');
        subtitle.style.cssText = 'text-align:center;font-family:Georgia,serif;font-style:italic;font-size:0.7rem;color:rgba(244,228,193,0.4);margin-bottom:2rem;';
        subtitle.textContent = 'Paintings rendered in characters. Each glyph a brushstroke. Each layer a pigment.';
        gallery.appendChild(subtitle);

        // Render each painting
        for (const paintingDef of PAINTING_MANIFEST) {
            const painting = await renderPainting(paintingDef);
            gallery.appendChild(painting);
        }

        // Navigation
        const nav = document.createElement('div');
        nav.className = 'nav-path';
        nav.innerHTML = '<span class="zone" title="Return to the farm">← FARM</span> &nbsp;·&nbsp; <span class="zone" title="Walk to the harbor">HARBOR →</span>';
        nav.querySelector('.zone:first-child').addEventListener('click', () => {
            window.location.href = 'farm.html?from=gallery';
        });
        nav.querySelector('.zone:last-child').addEventListener('click', () => {
            window.location.href = 'harbor.html?from=gallery';
        });
        gallery.appendChild(nav);

        // Footer
        const footer = document.createElement('div');
        footer.style.cssText = 'text-align:center;font-family:Cinzel,serif;font-size:0.5rem;letter-spacing:3px;color:rgba(139,125,107,0.3);margin-top:1rem;padding:1rem;';
        footer.textContent = 'NO IMAGES · NO CANVAS · ONLY CHARACTERS · SCENE LOADER';
        gallery.appendChild(footer);

        // Ambient sparks
        document.addEventListener('click', (e) => {
            if (Math.random() > 0.7 && !e.target.closest('.zone')) {
                const spark = document.createElement('div');
                spark.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:3px;height:3px;background:#d4af37;border-radius:50%;box-shadow:0 0 10px #d4af37;pointer-events:none;z-index:150;animation:sparkFade 1.2s ease-out forwards;`;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1300);
            }
        });
    }

    init();
    </script>
</body>
</html>
