<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom of Ealdor · The Courtyard</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #3d362f; --deep-stone: #2a2520; --mortar: #1a1612;
            --parchment: #f4e4c1; --ember: #c44f1c; --ember-bright: #e85d2c;
            --ash: #8b7d6b; --frost: #c8d8e4; --gold: #b8860b;
            --deep: #1a1410; --void: #0a0806; --water: #3a6b8c;
            --leaf: #2d3a1f; --leaf-light: #4a6b35;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Georgia','Times New Roman',serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(196,79,28,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(26,20,16,0.9) 0%, transparent 50%);
        }

        /* ── HEADER ── */
        .courtyard-header {
            text-align: center; padding: 1.2rem 1rem 0.3rem; width: 100%; z-index: 10;
        }
        .courtyard-header h1 {
            font-family: 'UnifrakturMaguntia',cursive;
            font-size: clamp(1.8rem,4.5vw,2.8rem);
            color: var(--gold);
            text-shadow: 0 0 15px rgba(184,134,11,0.4), 2px 2px 0 var(--void);
            letter-spacing: 4px;
        }
        .courtyard-header .subtitle {
            font-family: 'Cinzel',serif; font-size: 0.7rem; color: var(--ash);
            letter-spacing: 5px; text-transform: uppercase;
        }
        .glyph-divider {
            color: var(--gold); opacity: 0.4; font-size: 0.7rem;
            letter-spacing: 8px; text-align: center; margin-top: 0.1rem;
        }

        /* ── STAT PILLS ── */
        .stats-bar {
            display: flex; flex-wrap: wrap; gap: 0.3rem;
            justify-content: center; padding: 0.4rem; z-index: 10; width: 100%;
        }
        .stat-pill {
            background: rgba(26,20,16,0.75);
            border: 1px solid rgba(139,125,107,0.4);
            border-radius: 20px; padding: 0.2rem 0.6rem;
            font-size: 0.6rem; display: flex; align-items: center; gap: 0.2rem;
            font-family: 'Cinzel',serif; backdrop-filter: blur(4px);
        }
        .stat-pill .stat-icon { font-size: 0.75rem; }
        .stat-pill .stat-value { font-weight: bold; color: var(--gold); }
        .stat-pill .stat-value.low { color: #7a1c1c; }
        .stat-pill .stat-value.warn { color: var(--ember); }

        /* ── COURTYARD SCENE ── */
        #courtyard-scene {
            position: relative; width: 860px; max-width: 98vw;
            height: 550px; margin: 0.3rem auto 0.8rem; overflow: hidden;
            background: var(--void);
            border: 4px solid var(--deep-stone); border-radius: 6px;
            box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 160px rgba(0,0,0,0.3), inset 0 0 40px rgba(0,0,0,0.2);
        }
        @media (max-width: 880px) {
            #courtyard-scene { width: 98vw; height: calc(98vw * 0.64); }
        }

        .zone { cursor: pointer; transition: filter 0.25s, transform 0.25s; }
        .zone:hover { filter: brightness(1.35); z-index: 50 !important; }
        .zone:active { transform: scale(0.94); }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,6,0.94); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.5rem 1.2rem;
            font-family: 'Georgia',serif; font-size: 0.78rem;
            z-index: 200; opacity: 0; transition: opacity 0.35s;
            pointer-events: none; text-align: center; max-width: 420px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5); white-space: pre-line;
        }
        #toast.show { opacity: 1; }

        /* ── NOTICE BOARD ── */
        .notice-board {
            width: 90%; max-width: 550px; margin: 0 auto 1.5rem;
            background: linear-gradient(#5c4f42,#4a3f35);
            border: 5px solid #2a2520; border-radius: 3px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 5px 16px rgba(0,0,0,0.5), 0 0 0 2px #1a1410;
            padding: 0.6rem 0.8rem; position: relative;
        }
        .notice-board::before, .notice-board::after {
            content:'✦'; position:absolute; top:-8px; color:#2a2018; font-size:10px;
        }
        .notice-board::before { left:10px; } .notice-board::after { right:10px; }
        .notice-board .stats-row {
            display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; margin-bottom:0.4rem;
        }
        .notice-board .stat-item {
            font-family:'Cinzel',serif; font-size:0.6rem; color:var(--parchment);
            display:flex; align-items:center; gap:0.2rem;
        }
        .notice-board .stat-value { color:var(--gold); font-weight:bold; font-size:0.7rem; }
        .notice-board .stat-value.low { color:#7a1c1c; }
        .notice-board .stat-value.warn { color:var(--ember); }
        .notice-board .notice-text {
            text-align:center; font-style:italic; font-size:0.7rem;
            color:rgba(244,228,193,0.55); border-top:1px solid rgba(244,228,193,0.1);
            padding-top:0.4rem; letter-spacing:0.5px;
        }

        @keyframes sparkFade {
            0%{transform:scale(0.5);opacity:1}
            100%{transform:scale(2.5);opacity:0}
        }
        @keyframes waterShimmer {
            0%,100%{opacity:0.25} 50%{opacity:0.6}
        }
        @keyframes rippleExpand {
            0%{transform:scale(0.3);opacity:0.5}
            100%{transform:scale(2);opacity:0}
        }
        @keyframes lanternGlow {
            0%,100%{box-shadow:0 0 6px #daa520,0 0 14px rgba(218,165,32,0.2)}
            50%{box-shadow:0 0 12px #ffd700,0 0 24px rgba(218,165,32,0.4)}
        }
    </style>
</head>
<body>

    <header class="courtyard-header">
        <h1>𐤃 Kingdom of Ealdor 𐤃</h1>
        <div class="subtitle">The People's Yard · Heart of the Threshold</div>
        <div class="glyph-divider">𐤃 · 𐤀 · 𐤕 · 𐤔 · 𐤐 · 𐤌 · 𐤇</div>
    </header>

    <div class="stats-bar">
        <div class="stat-pill"><span class="stat-icon">🌾</span> Timber: <span class="stat-value" id="timberStat">3</span></div>
        <div class="stat-pill"><span class="stat-icon">❤️</span> Faith: <span class="stat-value" id="faithStat">60</span></div>
        <div class="stat-pill"><span class="stat-icon">☀️</span> Morale: <span class="stat-value" id="moraleStat">70</span></div>
        <div class="stat-pill"><span class="stat-icon">❄️</span> Ice: <span class="stat-value warn" id="iceStat">15%</span></div>
        <div class="stat-pill"><span class="stat-icon">📜</span> Tablets: <span class="stat-value" id="tabletStat">0</span>/7</div>
    </div>

    <div id="courtyard-scene"></div>

    <div class="notice-board">
        <div class="stats-row">
            <div class="stat-item">🌾 Timber: <span class="stat-value" id="nbTimber">3</span></div>
            <div class="stat-item">🪨 Stone: <span class="stat-value" id="nbStone">4</span></div>
            <div class="stat-item">🌾 Grain: <span class="stat-value" id="nbGrain">5</span></div>
            <div class="stat-item">⚒️ Iron: <span class="stat-value" id="nbIron">2</span></div>
            <div class="stat-item">🧂 Salt: <span class="stat-value" id="nbSalt">2</span></div>
            <div class="stat-item">🧵 Cloth: <span class="stat-value" id="nbCloth">3</span></div>
        </div>
        <div class="notice-text" id="noticeText">"The fire holds. The vault is open. The seventh tablet is still blank."</div>
    </div>

    <div id="toast"></div>

    <script src="js/font-mason.js"></script>
    <script src="js/scene-loader.js"></script>
    <script>
    /*
     * ═══════════════════════════════════════════════
     * THE COURTYARD · Kingdom of Ealdor
     * index.html — the hub of the world
     * Built with SceneLoader + FontMason
     * ═══════════════════════════════════════════════
     */

    // ── STATE ──
    const DEFAULT_STATE = {
        year: 3450, season: 0, ice: 15,
        playerResources: { Stone: 4, Timber: 3, Grain: 5, Iron: 2, Salt: 2, Cloth: 3 },
        population: 100, morale: 70, faith: 60,
        tabletFragments: 0, silentBrotherSpoke: false,
        crisisHistory: [], thingConvened: false, rabbitAppeared: false,
    };
    let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

    function loadState() {
        const raw = localStorage.getItem('ealdor_save');
        if (!raw) return false;
        try { state = { ...DEFAULT_STATE, ...JSON.parse(raw) }; return true; } catch(e) { return false; }
    }
    function saveState() { localStorage.setItem('ealdor_save', JSON.stringify(state)); }

    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(msg, d = 2800) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), d);
    }

    // ── RENDER STATS ──
    function renderStats() {
        const r = state.playerResources;
        document.getElementById('timberStat').textContent = r.Timber || 0;
        document.getElementById('faithStat').textContent = state.faith;
        document.getElementById('moraleStat').textContent = state.morale;
        document.getElementById('iceStat').textContent = state.ice + '%';
        document.getElementById('tabletStat').textContent = (state.tabletFragments || 0);

        document.getElementById('nbTimber').textContent = r.Timber || 0;
        document.getElementById('nbStone').textContent = r.Stone || 0;
        document.getElementById('nbGrain').textContent = r.Grain || 0;
        document.getElementById('nbIron').textContent = r.Iron || 0;
        document.getElementById('nbSalt').textContent = r.Salt || 0;
        document.getElementById('nbCloth').textContent = r.Cloth || 0;

        ['faithStat','moraleStat','nbTimber','nbStone','nbGrain','nbIron','nbSalt','nbCloth'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            const v = parseInt(el.textContent) || 0;
            el.className = 'stat-value' + (v === 0 ? ' low' : '');
        });
        const iceEl = document.getElementById('iceStat');
        if (iceEl) {
            iceEl.className = 'stat-value' + (state.ice > 70 ? ' low' : state.ice > 40 ? ' warn' : '');
        }

        // Update notice text
        const notices = [
            '"The fire holds. The vault is open. The seventh tablet is still blank."',
            state.ice > 60 ? '"The ice thickens. The Thing must decide soon."' : '"The yard is quiet. The people work. The Threshold holds."',
            state.rabbitAppeared ? '"The Rabbit was seen near the wild wood. Yellow feet. Split lip."' : '"Se deret, se deretai. Whoever holds is held."',
        ];
        document.getElementById('noticeText').textContent = notices[Math.floor(Date.now() / 10000) % notices.length];
    }

    // ═══════════════════════════════════
    // BUILD COURTYARD
    // ═══════════════════════════════════

    async function buildCourtyard() {
    const loader = new SceneLoader('courtyard-scene');

    // ── Interaction handler ──
    loader.onInteract = (objectName, action) => {
        switch (action) {
            case 'draw_water':
                state.morale = Math.min(100, state.morale + 2);
                toast('💧 You draw water from the well. Cold. Clear. The taste of the mountains.\n\nMorale +2');
                break;
            case 'check_notice':
                const iceLevel = state.ice;
                const warnings = [
                    iceLevel < 30 ? 'Ice: Light. Fjord open. Ships pass freely.' :
                    iceLevel < 55 ? 'Ice: Moderate. Passages narrowing. Caution advised.' :
                    iceLevel < 80 ? 'Ice: Heavy. Most passages closed. Harbor quiet.' :
                    'Ice: Severe. Fjord frozen. The harbor is locked in.',
                    state.thingConvened ? 'The Thing has convened. Decisions were made.' : 'The Thing has not yet convened this season.',
                    `Tablets: ${state.tabletFragments || 0}/7 fragments found.`,
                ];
                toast('📋 Courtyard Notice Board\n\n' + warnings.join('\n'));
                break;
            case 'tend_garden':
                state.morale = Math.min(100, state.morale + 1);
                toast('🌿 You tend the herb garden. Rosemary. Thyme. Plants that survive the cold.\n\nMorale +1');
                break;
            case 'visit_forge':
                const iron = state.playerResources.Iron || 0;
                const timber = state.playerResources.Timber || 0;
                if (iron > 0) {
                    state.playerResources.Iron -= 1;
                    state.playerResources.Stone = (state.playerResources.Stone || 0) + 2;
                    toast('🔨 Forge: 1 Iron → 2 Stone. The hammer rings across the yard.');
                } else if (timber >= 2) {
                    state.playerResources.Timber -= 2;
                    state.playerResources.Cloth = (state.playerResources.Cloth || 0) + 1;
                    toast('🪵 Workshop: 2 Timber → 1 Cloth. The looms turn.');
                } else {
                    toast('⚠️ Not enough materials. Need 1 Iron or 2 Timber to craft.');
                }
                break;
        }
        saveState();
        renderStats();
    };

    // ── Exit handler ──
    loader.onExit = (exit) => {
        saveState();
        toast(`🚶 Walking to the ${exit.label || exit.target}...`);
    };

    // ── Load the courtyard scene ──
    await loader.load('json/scenes/courtyard.json');
    loader.setState(state);  // ← moved here, after load

    addFountainEffects();
    addLanternEffects();

    return loader;
}
    function addFountainEffects() {
        const container = document.getElementById('courtyard-scene');
        if (!container) return;

        // Water shimmer overlay
        const shimmer = document.createElement('div');
        shimmer.style.cssText = `
            position: absolute; left: 355px; top: 348px;
            width: 170px; height: 24px; z-index: 15;
            color: #8ac8e8; font-size: 14px;
            font-family: Georgia,serif; line-height: 0.45;
            letter-spacing: 1px; pointer-events: none;
            animation: waterShimmer 2s ease-in-out infinite;
        `;
        shimmer.textContent = '~ · ~ · ≋ · ~ · ≈ · ~ · ≋ · ~';
        container.appendChild(shimmer);

        // Ripples
        const ripples = document.createElement('div');
        ripples.style.cssText = `
            position: absolute; left: 420px; top: 355px; z-index: 14;
            color: rgba(200,230,255,0.4); font-size: 9px;
            font-family: Georgia,serif; pointer-events: none;
            animation: rippleExpand 3s ease-out infinite;
        `;
        ripples.textContent = '○  ◌  ○  ◌  ○';
        container.appendChild(ripples);

        // Water spout
        const spout = document.createElement('div');
        spout.style.cssText = `
            position: absolute; left: 438px; top: 305px; z-index: 16;
            color: #8ac8e8; font-size: 10px;
            font-family: Georgia,serif; pointer-events: none;
        `;
        spout.textContent = '│  │  │  ╎  │';
        container.appendChild(spout);
    }

    function addLanternEffects() {
        const container = document.getElementById('courtyard-scene');
        if (!container) return;

        // Lantern by the gate
        const lantern = document.createElement('div');
        lantern.style.cssText = `
            position: absolute; left: 698px; top: 85px;
            width: 8px; height: 8px; background: #daa520;
            border-radius: 50%; z-index: 12;
            animation: lanternGlow 3s ease-in-out infinite;
            pointer-events: none;
        `;
        container.appendChild(lantern);
    }

    // ═══════════════════════════════════
    // INIT
    // ═══════════════════════════════════

    async function init() {
        const loaded = loadState();
        if (!loaded) saveState();

        const params = new URLSearchParams(window.location.search);
        const from = params.get('from');
        if (from) {
            const locationNames = {
                chapel: 'Coal Chapel',
                harbor: 'Fjord Harbor',
                great_hall: 'Great Hall',
                scriptorium: 'Scriptorium',
                vault: 'Tablet Vault',
                wild_wood: 'Wild Wood',
            };
            toast(`🚶 You return to the courtyard from the ${locationNames[from] || from}.`);
            window.history.replaceState({}, '', 'index.html');
        } else {
            toast('🏰 The Courtyard of Ealdor. The People\'s Yard. The heart of the Threshold.');
        }

        renderStats();
        await buildCourtyard();

        // Prayer sparks
        document.addEventListener('click', (e) => {
            if (Math.random() > 0.72 && !e.target.closest('.zone')) {
                const spark = document.createElement('div');
                spark.style.cssText = `
                    position: fixed;
                    left: ${e.clientX}px; top: ${e.clientY}px;
                    width: 3px; height: 3px;
                    background: #d4af37;
                    border-radius: 50%;
                    box-shadow: 0 0 10px #d4af37, 0 0 20px rgba(196,79,28,0.3);
                    pointer-events: none;
                    z-index: 150;
                    animation: sparkFade 1.4s ease-out forwards;
                `;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1500);
            }
        });
    }

    init();
    </script>
</body>
</html>
