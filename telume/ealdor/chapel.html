<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coal Chapel · Ealdor</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #3d362f; --deep-stone: #2a2520; --parchment: #f4e4c1;
            --ember: #c44f1c; --ember-bright: #e85d2c; --ash: #8b7d6b;
            --frost: #c8d8e4; --gold: #b8860b; --deep: #1a1410;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0c08;
            color: var(--parchment);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .chapel-header {
            text-align: center;
            padding: 1.5rem 1rem 0.5rem;
            z-index: 10;
        }
        .chapel-header h1 {
            font-family: 'UnifrakturCook', cursive;
            font-size: clamp(2rem, 5vw, 3.2rem);
            color: var(--gold);
            text-shadow: 0 0 12px rgba(184,134,11,0.5), 2px 2px 0 var(--deep);
        }
        .chapel-header .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: var(--ash);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #chapel-container {
            position: relative;
            width: 800px;
            max-width: 98vw;
            aspect-ratio: 4/3;
            margin: 1rem auto;
        }
        .stats-bar {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            justify-content: center; padding: 0.5rem; z-index: 10;
        }
        .stat-pill {
            background: rgba(26,20,16,0.7);
            border: 1px solid var(--ash);
            border-radius: 20px;
            padding: 0.25rem 0.7rem;
            font-size: 0.7rem;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .stat-pill .stat-value { font-weight: bold; color: var(--gold); }
        .stat-pill .stat-value.low { color: #7a1c1c; }
        .stat-pill .stat-value.warn { color: var(--ember); }
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: rgba(15,12,8,0.95); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.7rem 1.5rem;
            font-size: 0.85rem; z-index: 100; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            text-align: center; max-width: 450px; line-height: 1.4;
        }
        #toast.show { opacity: 1; }
        @keyframes coalPulse {
            0%, 100% { box-shadow: 0 0 25px var(--ember), 0 0 50px rgba(196,79,28,0.3); }
            50% { box-shadow: 0 0 40px var(--ember-bright), 0 0 80px rgba(196,79,28,0.6); }
        }
        @keyframes brotherBreathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>
    <div class="chapel-header">
        <h1>The Coal Chapel</h1>
        <div class="subtitle">Sanctuary of the Ātravan Flame</div>
    </div>
    <div class="stats-bar">
        <div class="stat-pill">🌾 Timber: <span class="stat-value" id="timberStat">3</span></div>
        <div class="stat-pill">❤️ Faith: <span class="stat-value" id="faithStat">60</span></div>
        <div class="stat-pill">☀️ Morale: <span class="stat-value" id="moraleStat">70</span></div>
        <div class="stat-pill">❄️ Ice: <span class="stat-value warn" id="iceStat">15%</span></div>
        <div class="stat-pill">📜 Tablets: <span class="stat-value" id="tabletStat">0/7</span></div>
    </div>
    <div id="chapel-container"></div>
    <div id="toast"></div>

    <script src="js/stone-mason.js"></script>
    <script src="js/object-renderer.js"></script>
    <script src="js/chapel-actions.js"></script>
    <script>
        // ═══════════════════════════════════
        // CHAPEL INIT
        // ═══════════════════════════════════

        let state = {
            year: 3450, season: 0, ice: 15,
            playerResources: { Stone: 4, Timber: 3, Grain: 5, Iron: 2, Salt: 2, Cloth: 3 },
            population: 100, morale: 70, faith: 60,
            tabletFragments: 0, silentBrotherSpoke: false,
            crisisHistory: [],
        };

        // Load saved state
        const saved = localStorage.getItem('ealdor_save');
        if (saved) {
            try { state = JSON.parse(saved); } catch(e) {}
        }

        function saveState() {
            localStorage.setItem('ealdor_save', JSON.stringify(state));
        }

        function toast(msg, duration = 2800) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), duration);
        }

        function renderStats() {
            document.getElementById('timberStat').textContent = state.playerResources.Timber || 0;
            document.getElementById('faithStat').textContent = state.faith;
            document.getElementById('moraleStat').textContent = state.morale;
            document.getElementById('iceStat').textContent = state.ice + '%';
            document.getElementById('tabletStat').textContent = (state.tabletFragments || 0) + '/7';
            ['faithStat','moraleStat'].forEach(id => {
                const el = document.getElementById(id);
                const v = parseInt(el.textContent);
                el.className = 'stat-value' + (v < 30 ? ' low' : v < 50 ? ' warn' : '');
            });
            const iceEl = document.getElementById('iceStat');
            iceEl.className = 'stat-value' + (state.ice > 70 ? ' low' : state.ice > 40 ? ' warn' : '');
        }

        // ═══════════════════════════════════
        // BUILD THE CHAPEL
        // ═══════════════════════════════════

        async function buildChapel() {
            // 1. Build the masonry (walls, floor, ceiling)
            const mason = new StoneMason('chapel-container');
            const chapelJson = await fetch('json/chapel.json').then(r => r.json());
            mason.buildChapel(chapelJson);
            mason.setState(state);

            // 2. Overlay interactive objects
            const objRenderer = new ObjectRenderer('chapel-container');
            const objectsJson = await fetch('json/chapel-objects.json').then(r => r.json());
            objRenderer.loadRoom(objectsJson);
            objRenderer.setState(state);

            // 3. Handle interactions
            objRenderer.on('onInteract', (objDef, el) => {
                const action = objDef.interaction?.action;
                if (!action || !CHAPEL_ACTIONS[action]) return;

                const result = CHAPEL_ACTIONS[action](state);
                
                if (result.toast) toast(result.toast);
                if (result.particles) {
                    // Trigger particle burst
                    if (result.particles.type === 'embers') {
                        spawnEmbers(result.particles.count);
                    }
                }
                if (result.navigate) {
                    saveState();
                    setTimeout(() => { window.location.href = result.navigate; }, 1000);
                }

                saveState();
                renderStats();
                mason.setState(state);
                objRenderer.setState(state);
            });

            // 4. Click sparks (ambient)
            document.addEventListener('click', (e) => {
                if (Math.random() > 0.7 && !e.target.closest('.zone')) {
                    const spark = document.createElement('div');
                    spark.style.cssText = `
                        position: fixed; left: ${e.clientX}px; top: ${e.clientY}px;
                        width: 4px; height: 4px; background: #ffd700;
                        border-radius: 50%; box-shadow: 0 0 12px #ffd700;
                        pointer-events: none; z-index: 90;
                        animation: sparkFade 1.4s ease-out forwards;
                    `;
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 1500);
                }
            });
        }

        function spawnEmbers(count) {
            const container = document.getElementById('chapel-container');
            for (let i = 0; i < count; i++) {
                const ember = document.createElement('div');
                ember.style.cssText = `
                    position: absolute; left: ${46 + Math.random() * 8}%; top: 48%;
                    width: ${2 + Math.random() * 4}px; height: ${2 + Math.random() * 4}px;
                    background: radial-gradient(circle, #ff6b2b, #c44f1c);
                    border-radius: 50%; pointer-events: none; z-index: 30;
                    animation: emberRise ${1.5 + Math.random() * 2}s ease-out forwards;
                    animation-delay: ${Math.random() * 0.4}s;
                `;
                container.appendChild(ember);
                setTimeout(() => ember.remove(), 3500);
            }
        }

        // Add keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes sparkFade {
                0% { transform: scale(1); opacity: 1; }
                100% { transform: scale(3); opacity: 0; }
            }
            @keyframes emberRise {
                0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
                100% { transform: translateY(-140px) translateX(${Math.random() > 0.5 ? '' : '-'}${20 + Math.random() * 40}px) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // INIT
        renderStats();
        buildChapel();

        // URL param
        const params = new URLSearchParams(window.location.search);
        if (params.get('from')) {
            toast(`🚶 You enter the Coal Chapel from the ${params.get('from')}. The warmth meets you at the door.`);
            window.history.replaceState({}, '', 'chapel.html');
        }
    </script>
</body>
</html>
