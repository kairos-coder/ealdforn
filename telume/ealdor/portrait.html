<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gallery · Generative Portraits · Ealdor</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0a0806; --deep: #1a1410;
            --parchment: #f4e4c1; --gold: #b8860b;
            --ember: #c44f1c; --water: #3a6b8c;
            --frame: #3d362f; --frame-light: #5c4f42;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(184,134,11,0.04) 0%, transparent 60%);
        }

        /* ── GALLERY HEADER ── */
        .gallery-header {
            text-align: center; padding: 1.5rem 1rem 0.5rem;
            position: relative; z-index: 10;
        }
        .gallery-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            color: var(--gold); letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(184,134,11,0.2);
        }
        .gallery-sub {
            font-family: 'Cinzel', serif; font-size: 0.45rem;
            letter-spacing: 5px; color: #8b7d6b;
            text-transform: uppercase; margin-top: 0.3rem;
        }

        /* ── CONTROLS ── */
        .gallery-controls {
            display: flex; gap: 10px; justify-content: center;
            padding: 0.8rem; position: relative; z-index: 10;
        }
        .gallery-btn {
            font-family: 'Cinzel', serif; font-size: 0.5rem;
            letter-spacing: 3px; text-transform: uppercase;
            padding: 8px 18px; border-radius: 4px;
            border: 1px solid #3d362f; background: rgba(26,20,16,0.7);
            color: #8b7d6b; cursor: pointer; transition: all 0.3s;
        }
        .gallery-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(184,134,11,0.08); }
        .gallery-btn.primary { border-color: var(--gold); color: var(--gold); }

        /* ── CANVAS ── */
        #painting-canvas {
            display: block; margin: 0 auto;
            max-width: 98vw; border: 8px solid var(--frame);
            box-shadow: 
                0 0 0 2px var(--frame-light),
                0 0 0 10px var(--deep),
                0 0 60px rgba(0,0,0,0.6),
                0 0 120px rgba(0,0,0,0.3),
                inset 0 0 40px rgba(0,0,0,0.2);
            image-rendering: pixelated;
        }

        /* ── PLAQUE ── */
        .plaque {
            text-align: center; padding: 0.8rem;
            font-family: 'Cinzel', serif; max-width: 600px;
            position: relative; z-index: 10;
        }
        .plaque-title {
            font-size: 0.7rem; letter-spacing: 4px;
            color: var(--gold); text-transform: uppercase;
        }
        .plaque-artist {
            font-size: 0.45rem; letter-spacing: 3px;
            color: #8b7d6b; margin-top: 0.3rem;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,6,0.94); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.5rem 1.2rem;
            font-family: 'Georgia', serif; font-size: 0.76rem;
            z-index: 200; opacity: 0; transition: opacity 0.35s;
            pointer-events: none; text-align: center; max-width: 420px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5); white-space: pre-line;
        }
        #toast.show { opacity: 1; }

        @keyframes sparkFade {
            0%{transform:scale(0.5);opacity:1} 100%{transform:scale(2.5);opacity:0}
        }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1 class="gallery-title">The Generative Gallery</h1>
        <p class="gallery-sub">Portraits Rendered in the Font-Mason's Craft</p>
    </div>

    <div class="gallery-controls">
        <button class="gallery-btn primary" onclick="generatePortrait()">⟳ New Portrait</button>
        <button class="gallery-btn" onclick="generatePortrait('noble')">👑 Noble</button>
        <button class="gallery-btn" onclick="generatePortrait('warrior')">⚔️ Warrior</button>
        <button class="gallery-btn" onclick="generatePortrait('seer')">🔮 Seer</button>
        <button class="gallery-btn" onclick="generatePortrait('commoner')">🧑 Commoner</button>
    </div>

    <canvas id="painting-canvas" width="600" height="800"></canvas>

    <div class="plaque">
        <div class="plaque-title" id="plaqueTitle">Portrait of a Citizen</div>
        <div class="plaque-artist" id="plaqueArtist">Attributed to the Font-Mason · Ealdor Gallery</div>
    </div>

    <div id="toast"></div>

    <script>
    /*
     * ═══════════════════════════════════════════════════════
     * THE GENERATIVE GALLERY · Portrait Renderer
     * Each portrait is a unique composition of typography.
     * No two are alike. Each is a generative act.
     * ═══════════════════════════════════════════════════════
     */

    const toastEl = document.getElementById('toast');
    function toast(msg) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    const canvas = document.getElementById('painting-canvas');
    const ctx = canvas.getContext('2d');
    const W = 600, H = 800;

    // ═══════════════════════════════════
    // SEEDED RANDOM — same portrait if you go back
    // ═══════════════════════════════════

    let seed = Date.now();
    function random() {
        seed = (seed * 1664525 + 1013904223) & 0xffffffff;
        return (seed >>> 0) / 0xffffffff;
    }
    function randInt(min, max) { return Math.floor(random() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(random() * arr.length)]; }

    // ═══════════════════════════════════
    // COLOR PALETTES
    // ═══════════════════════════════════

    const PALETTES = {
        noble:    { bg:['#1a1410','#1a1814','#141210'], skin:['#6b5d4f','#7a6b5c'], robe:['#4a1040','#6b1860','#3a0830'], trim:['#b8860b','#d4af37'], hair:['#2a2018','#3d3028','#1a1410'] },
        warrior:  { bg:['#14181a','#101418','#181410'], skin:['#5c4f42','#6b5d4f'], robe:['#2a3540','#3d4a55','#1a2530'], trim:['#6b7b8b','#8b9baa'], hair:['#1a1814','#2a2520'] },
        seer:     { bg:['#0a0f14','#0a0c10','#0f141a'], skin:['#5c5044','#6b5d4f'], robe:['#1a2a3a','#2a3a5a','#1a1a3a'], trim:['#3a6b8c','#5a8ab8'], hair:['#8b7d6b','#a09080','#c8c0b0'] },
        commoner: { bg:['#1a1810','#1a1610','#141210'], skin:['#5c4f42','#6b5d4f'], robe:['#3d3028','#4a3a30','#5c4a3a'], trim:['#6b5d4f','#8b7d6b'], hair:['#2a2018','#3d3028','#5c4a35'] },
    };

    // ═══════════════════════════════════
    // TYPOGRAPHIC ELEMENTS
    // ═══════════════════════════════════

    const FACE_GLYPHS = {
        eyes:    ['◉','◎','◈','◆','◇','⊙','◯','⬤'],
        nose:    ['◂','◃','▸','▹','┃','╎','│'],
        mouth:   ['▂','▃','▅','▁','⌣','⌢','▔','—'],
        brow:    ['⌒','⌢','—','˜','˘'],
        cheek:   ['( ',')','·','∘'],
        beard:   ['≈','≋','~','∿','﹏'],
    };

    const ROBE_PATTERNS = [
        '▓▒░▓▒░▓▒░▓▒░▓▒░▓',
        '▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬',
        '║╎│╎║╎│╎║╎│╎║╎│',
        '◆◇◆◇◆◇◆◇◆◇◆◇◆◇',
        '▞▚▞▚▞▚▞▚▞▚▞▚▞▚▞▚',
    ];

    const BACKGROUND_PATTERNS = [
        '· ✦ · ✧ · ✦ · ✧ · ✦',
        '○ ◌ ○ ◌ ○ ◌ ○ ◌ ○',
        '⌒ ⌣ ⌒ ⌣ ⌒ ⌣ ⌒ ⌣ ⌒',
    ];

    // ═══════════════════════════════════
    // GENERATE PORTRAIT
    // ═══════════════════════════════════

    function generatePortrait(type) {
        seed = Date.now();
        const types = ['noble','warrior','seer','commoner'];
        const chosenType = type || pick(types);
        const palette = PALETTES[chosenType];
        
        // ── BACKGROUND ──
        const bgColor = pick(palette.bg);
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, W, H);
        
        // Background texture — scattered glyphs
        const bgPattern = pick(BACKGROUND_PATTERNS);
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.font = '14px Georgia, serif';
        for (let i = 0; i < 20; i++) {
            const bx = random() * W;
            const by = random() * H;
            ctx.fillText(bgPattern[Math.floor(random() * bgPattern.length)], bx, by);
        }
        
        // ── FRAME INNER SHADOW ──
        const frameGrad = ctx.createRadialGradient(W/2, H/2, 200, W/2, H/2, 500);
        frameGrad.addColorStop(0, 'transparent');
        frameGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
        ctx.fillStyle = frameGrad;
        ctx.fillRect(0, 0, W, H);
        
        // ── SHOULDERS / ROBE ──
        const robeColor = pick(palette.robe);
        const robePattern = pick(ROBE_PATTERNS);
        
        // Robe fill — arch shape
        ctx.fillStyle = robeColor;
        ctx.beginPath();
        ctx.moveTo(50, H);
        ctx.quadraticCurveTo(150, 480, 300, 420);
        ctx.quadraticCurveTo(450, 480, 550, H);
        ctx.fill();
        
        // Robe texture lines
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.font = '16px monospace';
        for (let y = 440; y < H; y += 22) {
            const width = 100 + (y - 440) * 1.4;
            const chars = Math.floor(width / 10);
            let line = '';
            for (let c = 0; c < chars; c++) {
                line += robePattern[c % robePattern.length];
            }
            ctx.fillText(line, 300 - width/2, y);
        }
        
        // Robe trim
        const trimColor = pick(palette.trim);
        ctx.fillStyle = trimColor;
        ctx.font = '20px Cinzel, serif';
        const trimPattern = '◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆';
        for (let y = 440; y < H; y += 28) {
            ctx.fillText(trimPattern, 300 - 120, y);
            ctx.fillText(trimPattern, 300 + 40, y);
        }
        
        // Collar
        ctx.fillStyle = trimColor;
        ctx.font = '24px Georgia, serif';
        ctx.fillText('⌒', 278, 430);
        ctx.fillText('⌒', 308, 430);
        
        // ── NECK ──
        const skinColor = pick(palette.skin);
        ctx.fillStyle = skinColor;
        ctx.fillRect(282, 350, 36, 50);
        
        // ── HEAD ──
        ctx.fillStyle = skinColor;
        ctx.beginPath();
        ctx.ellipse(300, 280, 70, 85, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Head outline
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // ── HAIR ──
        const hairColor = pick(palette.hair);
        ctx.fillStyle = hairColor;
        ctx.font = 'bold 20px Georgia, serif';
        const hairChars = '≈ ≋ ~ ∿ ﹏ ≈ ≋ ~ ∿';
        for (let y = 200; y < 260; y += 12) {
            const offset = Math.sin((y - 200) * 0.1) * 20;
            ctx.fillText(hairChars, 230 + offset, y);
        }
        // Hair sides
        ctx.font = '18px Georgia, serif';
        for (let y = 240; y < 340; y += 14) {
            ctx.fillText('≈≋≈', 225, y);
            ctx.fillText('≈≋≈', 340, y);
        }
        
        // ── EYES ──
        const eyeGlyph = pick(FACE_GLYPHS.eyes);
        ctx.fillStyle = pick(palette.bg);
        ctx.font = '28px Georgia, serif';
        ctx.fillText(eyeGlyph, 270, 275);
        ctx.fillText(eyeGlyph, 312, 275);
        
        // Eye highlights
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '10px Georgia, serif';
        ctx.fillText('·', 274, 272);
        ctx.fillText('·', 316, 272);
        
        // ── BROWS ──
        const browGlyph = pick(FACE_GLYPHS.brow);
        ctx.fillStyle = hairColor;
        ctx.font = '22px Georgia, serif';
        ctx.fillText(browGlyph, 265, 258);
        ctx.fillText(browGlyph, 310, 258);
        
        // ── NOSE ──
        const noseGlyph = pick(FACE_GLYPHS.nose);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.font = '18px Georgia, serif';
        ctx.fillText(noseGlyph, 296, 295);
        
        // ── MOUTH ──
        const mouthGlyph = pick(FACE_GLYPHS.mouth);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.font = '20px Georgia, serif';
        ctx.fillText(mouthGlyph, 290, 325);
        
        // ── CHEEKS ──
        if (random() > 0.5) {
            ctx.fillStyle = 'rgba(196,79,28,0.12)';
            ctx.font = '14px Georgia, serif';
            ctx.fillText('(', 258, 295);
            ctx.fillText(')', 335, 295);
        }
        
        // ── BEARD (if warrior or elder type) ──
        if (chosenType === 'warrior' || (chosenType === 'seer' && random() > 0.5)) {
            const beardGlyph = pick(FACE_GLYPHS.beard);
            ctx.fillStyle = hairColor;
            ctx.font = '16px Georgia, serif';
            for (let y = 335; y < 370; y += 10) {
                ctx.fillText(beardGlyph, 270, y);
            }
        }
        
        // ── HEADPIECE ──
        if (chosenType === 'noble') {
            ctx.fillStyle = trimColor;
            ctx.font = '28px Georgia, serif';
            ctx.fillText('◆', 286, 195);
            ctx.fillText('◇', 270, 205);
            ctx.fillText('◇', 315, 205);
        } else if (chosenType === 'warrior') {
            ctx.fillStyle = pick(palette.trim);
            ctx.font = '22px Georgia, serif';
            ctx.fillText('⌒', 280, 200);
            ctx.fillText('◆', 290, 190);
        } else if (chosenType === 'seer') {
            ctx.fillStyle = trimColor;
            ctx.font = '16px Georgia, serif';
            const stars = '✧ ✦ ✧ ✦ ✧';
            ctx.fillText(stars, 265, 200);
        }
        
        // ── SIGNATURE GLYPH (bottom corner) ──
        ctx.fillStyle = 'rgba(184,134,11,0.3)';
        ctx.font = '12px Georgia, serif';
        ctx.fillText('𐤇 𐤌 𐤐', 520, 760);
        
        // ── UPDATE PLAQUE ──
        const names = {
            noble: ['Lady Elara of House Stone','Lord Aldric the Gilded','Countess Mira von Thal'],
            warrior: ['Captain Sigurd Ironside','Shield-Maiden Freya','Warlord Torben'],
            seer: ['Oracle Thalia','Seer Caspian the Far-Eyed','The Veiled Prophet'],
            commoner: ['Agnar of the Fjord','Elda the Radish Farmer','Old Thora of Ealdor'],
        };
        const name = pick(names[chosenType]);
        document.getElementById('plaqueTitle').textContent = `Portrait of ${name}`;
        document.getElementById('plaqueArtist').textContent = `Generated by the Font-Mason · ${chosenType.charAt(0).toUpperCase() + chosenType.slice(1)} Type · Ealdor Gallery`;
        
        toast(`🎨 ${name}\n\nA new portrait materializes from the typographic ether. Each glyph placed by the Font-Mason's hand. Each composition unique. Each face a generative act.`);
    }

    // ═══════════════════════════════════
    // INIT
    // ═══════════════════════════════════

    function init() {
        generatePortrait();
        
        document.addEventListener('click', (e) => {
            if (Math.random() > 0.75 && !e.target.closest('button')) {
                const spark = document.createElement('div');
                spark.style.cssText = `
                    position:fixed; left:${e.clientX}px; top:${e.clientY}px;
                    width:3px; height:3px; background:#d4af37;
                    border-radius:50%; box-shadow:0 0 10px #d4af37;
                    pointer-events:none; z-index:150;
                    animation:sparkFade 1.2s ease-out forwards;
                `;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1300);
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.target.closest('input,textarea')) {
                e.preventDefault();
                generatePortrait();
            }
        });
    }

    window.generatePortrait = generatePortrait;
    init();
    </script>
</body>
</html>
