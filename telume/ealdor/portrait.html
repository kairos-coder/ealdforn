<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gallery · Font-Mason Portraits · Ealdor</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0a0806; --deep: #1a1410;
            --parchment: #f4e4c1; --gold: #b8860b;
            --frame: #3d362f; --frame-light: #5c4f42;
            --skin-highlight: #8b7d6b; --skin-mid: #6b5d4f;
            --skin-shadow: #5c4f42; --skin-deep: #3d3028;
            --skin-darkest: #2a2018;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(184,134,11,0.04) 0%, transparent 60%);
        }

        .gallery-header {
            text-align: center; padding: 1rem 1rem 0.3rem;
            position: relative; z-index: 10;
        }
        .gallery-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--gold); letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(184,134,11,0.2);
        }
        .gallery-sub {
            font-family: 'Cinzel', serif; font-size: 0.4rem;
            letter-spacing: 5px; color: #8b7d6b;
            text-transform: uppercase; margin-top: 0.2rem;
        }

        .gallery-controls {
            display: flex; gap: 8px; justify-content: center;
            padding: 0.5rem; position: relative; z-index: 10;
            flex-wrap: wrap;
        }
        .gallery-btn {
            font-family: 'Cinzel', serif; font-size: 0.45rem;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 6px 14px; border-radius: 4px;
            border: 1px solid #3d362f; background: rgba(26,20,16,0.7);
            color: #8b7d6b; cursor: pointer; transition: all 0.3s;
        }
        .gallery-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(184,134,11,0.08); }
        .gallery-btn.primary { border-color: var(--gold); color: var(--gold); }

        #portrait-frame {
            position: relative; width: 500px; max-width: 96vw;
            height: 660px; margin: 0.5rem auto;
            border: 8px solid var(--frame);
            box-shadow: 
                0 0 0 2px var(--frame-light),
                0 0 0 10px var(--deep),
                0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
            background: #1a1410;
        }
        @media (max-width: 520px) {
            #portrait-frame { height: calc(96vw * 1.32); }
        }

        .plaque {
            text-align: center; padding: 0.5rem;
            font-family: 'Cinzel', serif; max-width: 500px;
            position: relative; z-index: 10;
        }
        .plaque-title {
            font-size: 0.65rem; letter-spacing: 3px;
            color: var(--gold); text-transform: uppercase;
        }
        .plaque-artist {
            font-size: 0.4rem; letter-spacing: 2px;
            color: #8b7d6b; margin-top: 0.2rem;
        }

        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,6,0.94); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.5rem 1.2rem;
            font-family: 'Georgia', serif; font-size: 0.76rem;
            z-index: 200; opacity: 0; transition: opacity 0.35s;
            pointer-events: none; text-align: center; max-width: 420px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5); white-space: pre-line;
        }
        #toast.show { opacity: 1; }

        @keyframes sparkFade {
            0%{transform:scale(0.5);opacity:1} 100%{transform:scale(2.5);opacity:0}
        }
        @keyframes gentlePulse {
            0%,100%{opacity:0.7} 50%{opacity:1}
        }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1 class="gallery-title">The Generative Gallery</h1>
        <p class="gallery-sub">Portraits Built in the Font-Mason's Craft</p>
    </div>

    <div class="gallery-controls">
        <button class="gallery-btn primary" onclick="generatePortrait()">⟳ New Face</button>
        <button class="gallery-btn" onclick="generatePortrait('noble')">👑 Noble</button>
        <button class="gallery-btn" onclick="generatePortrait('warrior')">⚔️ Warrior</button>
        <button class="gallery-btn" onclick="generatePortrait('seer')">🔮 Seer</button>
        <button class="gallery-btn" onclick="generatePortrait('elder')">📜 Elder</button>
    </div>

    <div id="portrait-frame"></div>

    <div class="plaque">
        <div class="plaque-title" id="plaqueTitle">Portrait of a Citizen</div>
        <div class="plaque-artist" id="plaqueArtist">Attributed to the Font-Mason · Ealdor Gallery</div>
    </div>

    <div id="toast"></div>

    <script src="js/font-mason.js"></script>
    <script>
    /*
     * ═══════════════════════════════════════════════════════
     * THE GENERATIVE GALLERY · FontMason Portrait Engine
     * Every face built from placed blocks.
     * Every glyph a brushstroke. Every portrait a construction.
     * ═══════════════════════════════════════════════════════
     */

    const toastEl = document.getElementById('toast');
    function toast(msg) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    let seed = Date.now();
    function random() {
        seed = (seed * 1664525 + 1013904223) & 0xffffffff;
        return (seed >>> 0) / 0xffffffff;
    }
    function randInt(min, max) { return Math.floor(random() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(random() * arr.length)]; }

    // ═══════════════════════════════════
    // FONT-MASON MATERIALS FOR SKIN
    // ═══════════════════════════════════

    const SKIN_MATERIALS = {
        highlight:  { chars:['·','∘','○','·','·'], textColor:'#8b7d6b', mortarColor:'transparent', fontSize:18, lineHeight:0.35, letterSpacing:2, fontFamily:"'Georgia',serif", weathering:0 },
        midtone:    { chars:['░','⋅','░','⋅','▒'], textColor:'#6b5d4f', mortarColor:'transparent', fontSize:18, lineHeight:0.35, letterSpacing:1, fontFamily:"'Georgia',serif", weathering:0 },
        shadow:     { chars:['▒','░','▒','▓','▒'], textColor:'#5c4f42', mortarColor:'transparent', fontSize:16, lineHeight:0.32, letterSpacing:0, fontFamily:'monospace', weathering:0 },
        deepShadow: { chars:['▓','▒','▓','█','▓'], textColor:'#3d3028', mortarColor:'transparent', fontSize:14, lineHeight:0.30, letterSpacing:-1, fontFamily:'monospace', weathering:0 },
        darkest:    { chars:['█','▓','█','▓','█'], textColor:'#2a2018', mortarColor:'transparent', fontSize:12, lineHeight:0.28, letterSpacing:-1, fontFamily:'monospace', weathering:0 },
    };

    const HAIR_MATERIALS = {
        brown:  { chars:['≈','≋','~','≈','≋'], textColor:'#3d3028', mortarColor:'transparent', fontSize:20, lineHeight:0.30, letterSpacing:-1, fontFamily:"'Georgia',serif", weathering:0 },
        dark:   { chars:['▓','▒','░','▓','▒'], textColor:'#2a2018', mortarColor:'transparent', fontSize:18, lineHeight:0.28, letterSpacing:-2, fontFamily:'monospace', weathering:0 },
        grey:   { chars:['≈','~','≋','≈','~'], textColor:'#8b7d6b', mortarColor:'transparent', fontSize:20, lineHeight:0.30, letterSpacing:-1, fontFamily:"'Georgia',serif", weathering:0 },
        white:  { chars:['~','≈','⋅','~','≈'], textColor:'#c8c0b0', mortarColor:'transparent', fontSize:20, lineHeight:0.30, letterSpacing:-1, fontFamily:"'Georgia',serif", weathering:0 },
        red:    { chars:['≋','≈','≋','≈','≋'], textColor:'#8b4a2a', mortarColor:'transparent', fontSize:20, lineHeight:0.30, letterSpacing:-1, fontFamily:"'Georgia',serif", weathering:0 },
    };

    const ROBE_MATERIALS = {
        noble:  { chars:['◆','◇','◆','◇','◆'], textColor:'#6b1860', mortarColor:'#3a0830', fontSize:22, lineHeight:0.40, letterSpacing:0, fontFamily:"'Georgia',serif", weathering:0.02 },
        warrior:{ chars:['▬','▬','▬','▬','▬'], textColor:'#3d4a55', mortarColor:'#1a2530', fontSize:20, lineHeight:0.38, letterSpacing:-1, fontFamily:'monospace', weathering:0.04 },
        seer:   { chars:['◈','◇','◈','◇','◈'], textColor:'#2a3a5a', mortarColor:'#1a1a3a', fontSize:20, lineHeight:0.38, letterSpacing:0, fontFamily:"'Georgia',serif", weathering:0.02 },
        elder:  { chars:['▓','▒','░','▓','▒'], textColor:'#4a3a30', mortarColor:'#2a2018', fontSize:20, lineHeight:0.38, letterSpacing:-1, fontFamily:'monospace', weathering:0.06 },
    };

    const TRIM_MATERIALS = {
        gold:   { chars:['◆','◇','◆','◇','◆'], textColor:'#d4af37', mortarColor:'transparent', fontSize:14, lineHeight:0.35, letterSpacing:1, fontFamily:"'Georgia',serif", weathering:0 },
        silver: { chars:['◇','◈','◇','◈','◇'], textColor:'#a0a8b8', mortarColor:'transparent', fontSize:14, lineHeight:0.35, letterSpacing:1, fontFamily:"'Georgia',serif", weathering:0 },
        bronze: { chars:['◆','◆','◆','◆','◆'], textColor:'#b8860b', mortarColor:'transparent', fontSize:14, lineHeight:0.35, letterSpacing:1, fontFamily:"'Georgia',serif", weathering:0 },
    };

    // ═══════════════════════════════════
    // FACE DATA
    // ═══════════════════════════════════

    const FACE_GLYPHS = {
        eyes:      ['◉','◎','◈','◆','⊙','◯','⬤','⏺'],
        brows:     ['⌣','⌢','—','˜','∼'],
        nose:      ['▾','▴','▸','◂','│'],
        mouth:     ['▂','▃','▅','▁','⌣','▔'],
        eyeHighlight: ['⋅','∘','·'],
    };

    const HEADPIECES = {
        noble:  { glyph:'◆', color:'#d4af37', size:22, y:-4 },
        warrior:{ glyph:'⌒', color:'#8b9baa', size:24, y:-6 },
        seer:   { glyph:'✧', color:'#5a8ab8', size:20, y:-2 },
        elder:  { glyph:'⌣', color:'#8b7d6b', size:18, y:-2 },
    };

    const NAMES = {
        noble:   ['Lady Elara von Stone','Lord Aldric the Gilded','Countess Mira Thal','Duke Severin Black'],
        warrior: ['Captain Sigurd Ironside','Shield-Maiden Freya','Warlord Torben Helm-Splitter','Knight-Commander Aldis'],
        seer:    ['Oracle Thalia Far-Eye','Seer Caspian the Veiled','Prophetess Morna Deep-Sight','The Silent Watcher'],
        elder:   ['Old Agnar of the Fjord','Grandmother Elda','Thora the Rememberer','Ealdorman Oswin'],
    };

    // ═══════════════════════════════════
    // BUILD FACE WITH FONT-MASON
    // ═══════════════════════════════════

    function generatePortrait(type) {
        seed = Date.now();
        const types = ['noble','warrior','seer','elder'];
        const chosenType = type || pick(types);
        
        const container = document.getElementById('portrait-frame');
        container.innerHTML = '';
        
        const m = new FontMason('portrait-frame');
        const CX = 250; // center X of the 500px frame
        const CY = 270; // center Y of the face
        
        // Register skin materials
        Object.entries(SKIN_MATERIALS).forEach(([name, mat]) => {
            FontMason.MATERIALS['skin_'+name] = mat;
        });
        Object.entries(HAIR_MATERIALS).forEach(([name, mat]) => {
            FontMason.MATERIALS['hair_'+name] = mat;
        });
        Object.entries(ROBE_MATERIALS).forEach(([name, mat]) => {
            FontMason.MATERIALS['robe_'+name] = mat;
        });
        Object.entries(TRIM_MATERIALS).forEach(([name, mat]) => {
            FontMason.MATERIALS['trim_'+name] = mat;
        });
        
        // ── BACKGROUND ──
        m.buildWall({
            chars:['·','·','·','✦','·'], textColor:'#1a1410', mortarColor:'#0a0806',
            fontSize:16, lineHeight:0.6, letterSpacing:4, fontFamily:"'Georgia',serif",
            x:0, y:0, width:500, height:660, z:0
        });
        
        // ── BACKGROUND TEXTURE — sparse stars ──
        for (let i = 0; i < 15; i++) {
            const sx = randInt(20, 460);
            const sy = randInt(20, 620);
            m.buildInscription({
                text: pick(['·','✦','✧','⋅']),
                x: sx, y: sy,
                fontSize: randInt(6, 14),
                color: `rgba(200,180,150,${0.05 + random() * 0.1})`,
                fontFamily: "'Georgia',serif",
                z: 0
            });
        }
        
        // ── ROBE / SHOULDERS ──
        const robeMat = 'robe_' + chosenType;
        m.buildWall({
            ...FontMason.mat(robeMat),
            x: 40, y: CY + 100, width: 420, height: 300, z: 1
        });
        
        // Robe collar — arch shape
        m.buildWall({
            ...FontMason.mat(robeMat),
            x: 150, y: CY + 55, width: 200, height: 50, z: 3,
            shape: 'circle'
        });
        
        // Collar trim
        const trimMat = chosenType === 'noble' ? 'trim_gold' : chosenType === 'warrior' ? 'trim_silver' : 'trim_bronze';
        m.buildArch({
            ...FontMason.mat(trimMat),
            cx: CX, cy: CY + 80, innerRadius: 90,
            stoneCount: 15, stoneDepth: 12, z: 4,
            keystoneChar: pick(['◆','◇','◆']),
            keystoneOversize: 1.3
        });
        
        // ── NECK ──
        m.buildWall({
            ...FontMason.mat('skin_midtone'),
            x: CX - 18, y: CY + 40, width: 36, height: 40, z: 2
        });
        
        // Neck shadow on sides
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX - 22, y: CY + 40, width: 6, height: 40, z: 3
        });
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX + 16, y: CY + 40, width: 6, height: 40, z: 3
        });
        
        // ── HEAD SHAPE — built from layered walls ──
        
        // Skull cap (top of head) — highlight
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 55, y: CY - 100, width: 110, height: 50, z: 2,
            shape: 'circle'
        });
        
        // Upper face — midtone, broad
        m.buildWall({
            ...FontMason.mat('skin_midtone'),
            x: CX - 60, y: CY - 70, width: 120, height: 80, z: 2,
            shape: 'circle'
        });
        
        // Forehead highlight
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 35, y: CY - 75, width: 70, height: 30, z: 3
        });
        
        // ── BROW RIDGE ──
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX - 50, y: CY - 30, width: 100, height: 14, z: 4
        });
        
        // Brow arch
        const browGlyph = pick(FACE_GLYPHS.brows);
        m.buildArch({
            chars: [browGlyph, browGlyph, browGlyph],
            textColor: pick(['#2a2018','#1a1410','#3d3028']),
            fontSize: 16,
            fontFamily: "'Georgia',serif",
            cx: CX, cy: CY - 28, innerRadius: 40,
            stoneCount: 9, stoneDepth: 8, z: 5
        });
        
        // ── EYE SOCKETS — deep shadow ──
        m.buildWall({
            ...FontMason.mat('skin_deepShadow'),
            x: CX - 45, y: CY - 20, width: 30, height: 22, z: 3,
            shape: 'circle'
        });
        m.buildWall({
            ...FontMason.mat('skin_deepShadow'),
            x: CX + 15, y: CY - 20, width: 30, height: 22, z: 3,
            shape: 'circle'
        });
        
        // ── EYES ──
        const eyeGlyph = pick(FACE_GLYPHS.eyes);
        m.buildInscription({
            text: eyeGlyph, x: CX - 34, y: CY - 16,
            fontSize: 16, color: pick(['#f4e4c1','#e8d8b0','#ffe8c0']),
            fontFamily: "'Georgia',serif", z: 6
        });
        m.buildInscription({
            text: eyeGlyph, x: CX + 26, y: CY - 16,
            fontSize: 16, color: pick(['#f4e4c1','#e8d8b0','#ffe8c0']),
            fontFamily: "'Georgia',serif", z: 6
        });
        
        // Eye highlights
        const highlightDot = pick(FACE_GLYPHS.eyeHighlight);
        m.buildInscription({
            text: highlightDot, x: CX - 32, y: CY - 20,
            fontSize: 8, color: 'rgba(255,255,255,0.6)',
            fontFamily: "'Georgia',serif", z: 7
        });
        m.buildInscription({
            text: highlightDot, x: CX + 28, y: CY - 20,
            fontSize: 8, color: 'rgba(255,255,255,0.6)',
            fontFamily: "'Georgia',serif", z: 7
        });
        
        // ── CHEEKBONES ──
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 55, y: CY + 5, width: 20, height: 12, z: 3
        });
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX + 35, y: CY + 5, width: 20, height: 12, z: 3
        });
        
        // Cheek hollows — shadow below cheekbones
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX - 52, y: CY + 16, width: 25, height: 20, z: 3,
            shape: 'circle'
        });
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX + 27, y: CY + 16, width: 25, height: 20, z: 3,
            shape: 'circle'
        });
        
        // ── NOSE ──
        // Bridge — vertical highlight
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 6, y: CY - 18, width: 12, height: 35, z: 5
        });
        
        // Nose sides — shadow
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX - 14, y: CY - 8, width: 6, height: 30, z: 4
        });
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX + 8, y: CY - 8, width: 6, height: 30, z: 4
        });
        
        // Nose tip — brightest
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 8, y: CY + 12, width: 16, height: 10, z: 6,
            shape: 'circle'
        });
        
        // Nostrils — darkest
        const noseGlyph = pick(FACE_GLYPHS.nose);
        m.buildInscription({
            text: noseGlyph, x: CX - 4, y: CY + 14,
            fontSize: 10, color: '#2a2018',
            fontFamily: "'Georgia',serif", z: 7
        });
        
        // ── UNDER-NOSE SHADOW ──
        m.buildWall({
            ...FontMason.mat('skin_deepShadow'),
            x: CX - 14, y: CY + 20, width: 28, height: 6, z: 4
        });
        
        // ── MOUTH ──
        const mouthGlyph = pick(FACE_GLYPHS.mouth);
        m.buildInscription({
            text: mouthGlyph, x: CX - 12, y: CY + 32,
            fontSize: 14, color: '#2a2018',
            fontFamily: "'Georgia',serif", z: 6
        });
        
        // Upper lip highlight
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 10, y: CY + 26, width: 20, height: 4, z: 5
        });
        
        // Lower lip — midtone
        m.buildWall({
            ...FontMason.mat('skin_midtone'),
            x: CX - 8, y: CY + 35, width: 16, height: 5, z: 5
        });
        
        // ── CHIN ──
        m.buildWall({
            ...FontMason.mat('skin_highlight'),
            x: CX - 14, y: CY + 44, width: 28, height: 16, z: 4,
            shape: 'circle'
        });
        
        // Under-chin shadow
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX - 16, y: CY + 56, width: 32, height: 10, z: 3
        });
        
        // ── JAWLINE — shadow on the edges ──
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX - 55, y: CY + 20, width: 12, height: 40, z: 2,
            shape: 'circle'
        });
        m.buildWall({
            ...FontMason.mat('skin_shadow'),
            x: CX + 43, y: CY + 20, width: 12, height: 40, z: 2,
            shape: 'circle'
        });
        
        // ── HAIR ──
        const hairOptions = chosenType === 'elder' ? ['grey','white'] : 
                             chosenType === 'warrior' ? ['dark','brown','red'] :
                             ['brown','dark','red'];
        const hairMat = 'hair_' + pick(hairOptions);
        
        // Hair — top
        m.buildWall({
            ...FontMason.mat(hairMat),
            x: CX - 60, y: CY - 100, width: 120, height: 30, z: 6,
            shape: 'circle'
        });
        
        // Hair — sides
        m.buildWall({
            ...FontMason.mat(hairMat),
            x: CX - 62, y: CY - 70, width: 16, height: 120, z: 6
        });
        m.buildWall({
            ...FontMason.mat(hairMat),
            x: CX + 46, y: CY - 70, width: 16, height: 120, z: 6
        });
        
        // Hair — top dome
        m.buildWall({
            ...FontMason.mat(hairMat),
            x: CX - 50, y: CY - 110, width: 100, height: 24, z: 7
        });
        
        // ── BEARD (warrior/elder) ──
        if (chosenType === 'warrior' || chosenType === 'elder') {
            m.buildWall({
                ...FontMason.mat(hairMat),
                x: CX - 20, y: CY + 52, width: 40, height: 30, z: 5,
                shape: 'circle'
            });
        }
        
        // ── HEADPIECE ──
        const hp = HEADPIECES[chosenType];
        m.buildInscription({
            text: hp.glyph, x: CX - (hp.size/2), y: CY - 118 + (hp.y || 0),
            fontSize: hp.size, color: hp.color,
            fontFamily: "'Georgia',serif", z: 8
        });
        
        // ── SIGNATURE ──
        m.buildInscription({
            text: 'FONT · MASON · FECIT',
            x: 340, y: 630,
            fontSize: 5, color: 'rgba(184,134,11,0.3)',
            fontFamily: "'Cinzel',serif", z: 9
        });
        
        // ── UPDATE PLAQUE ──
        const name = pick(NAMES[chosenType]);
        document.getElementById('plaqueTitle').textContent = `Portrait of ${name}`;
        document.getElementById('plaqueArtist').textContent = `Built by the Font-Mason · ${chosenType.charAt(0).toUpperCase() + chosenType.slice(1)} Type · Ealdor Gallery`;
        
        toast(`🎨 ${name}\n\nA face constructed from ${chosenType} materials. Each glyph placed by the mason's hand. The skin is ${Object.keys(SKIN_MATERIALS).length} densities of shadow. The portrait is a generative act.`);
    }

    // ═══════════════════════════════════
    // INIT
    // ═══════════════════════════════════

    function init() {
        generatePortrait();
        
        document.addEventListener('click', (e) => {
            if (Math.random() > 0.75 && !e.target.closest('button')) {
                const spark = document.createElement('div');
                spark.style.cssText = `
                    position:fixed; left:${e.clientX}px; top:${e.clientY}px;
                    width:3px; height:3px; background:#d4af37;
                    border-radius:50%; box-shadow:0 0 10px #d4af37;
                    pointer-events:none; z-index:150;
                    animation:sparkFade 1.2s ease-out forwards;
                `;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1300);
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.target.closest('input,textarea')) {
                e.preventDefault();
                generatePortrait();
            }
        });
    }

    window.generatePortrait = generatePortrait;
    init();
    </script>
</body>
</html>
