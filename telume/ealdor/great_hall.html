<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Hall · Ealdor</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #3d362f; --deep-stone: #2a2520; --parchment: #f4e4c1;
            --ember: #c44f1c; --gold: #b8860b; --ash: #8b7d6b; --void: #0a0806;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--void); color: var(--parchment);
            font-family: 'Georgia','Times New Roman',serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }
        #scene { position:relative; width:820px; max-width:98vw; height:600px; margin:1rem auto; overflow:hidden; background:var(--void); border:4px solid var(--deep-stone); border-radius:4px; box-shadow:0 0 80px rgba(0,0,0,0.6); }
        @media(max-width:840px){ #scene{width:98vw;height:calc(98vw*0.73);} }
        .zone{cursor:pointer;transition:filter 0.25s,transform 0.25s}
        .zone:hover{filter:brightness(1.35);z-index:50!important}
        .zone:active{transform:scale(0.94)}
        #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:rgba(10,8,6,0.94);border:1px solid var(--gold);border-radius:6px;padding:0.5rem 1.2rem;font-family:'Georgia',serif;font-size:0.78rem;z-index:200;opacity:0;transition:opacity 0.35s;pointer-events:none;text-align:center;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,0.5);white-space:pre-line}
        #toast.show{opacity:1}
        @keyframes sparkFade{0%{transform:scale(0.5);opacity:1}100%{transform:scale(2.5);opacity:0}}
    </style>
</head>
<body>
    <div id="scene"></div>
    <div id="toast"></div>
    <script src="js/font-mason.js"></script>
    <script src="js/scene-loader.js"></script>
    <script>
        const DEFAULT_STATE = {
            year:3450, season:0, ice:15,
            playerResources:{Stone:4,Timber:3,Grain:5,Iron:2,Salt:2,Cloth:3},
            population:100, morale:70, faith:60,
            tabletFragments:0, crisisHistory:[], thingConvened:false,
        };
        let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
        
        function loadState(){
            const raw = localStorage.getItem('ealdor_save');
            if(!raw) return false;
            try{state={...DEFAULT_STATE,...JSON.parse(raw)};return true}catch(e){return false}
        }
        function saveState(){localStorage.setItem('ealdor_save',JSON.stringify(state))}
        
        const toastEl = document.getElementById('toast');
        let toastTimer;
        function toast(msg,d=2800){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),d)}
        
        async function init(){
            loadState();
            const loader = new SceneLoader('scene');
            loader.setState(state);
            
            loader.onInteract = (objectName, action) => {
                switch(action){
                    case 'observe_throne':
                        toast('👑 The throne is empty. It has always been empty.\n\n"A king shall not be." — The first law of the Thing.\n\nThe seat is clean. Someone dusts it. No one sits.');
                        state.faith = Math.min(100, state.faith + 1);
                        break;
                    case 'convene_thing':
                        if(state.thingConvened){
                            toast('🪨 The Thing has already convened this season. The stones are warm. The voices have settled.');
                            break;
                        }
                        state.thingConvened = true;
                        state.morale = Math.min(100, state.morale + 8);
                        state.faith = Math.min(100, state.faith + 3);
                        const outcomes = [
                            'The council convenes. Twelve voices rise. A decision is reached — the fjord patrols will increase.',
                            'The Thing gathers. Debate is fierce. By dusk, a compromise holds. The granary will be shared.',
                            'Voices echo through the hall. No clear decision — but the talking itself is the thing. The Thing is the talking.',
                        ];
                        toast('🪨 ' + outcomes[Math.floor(Math.random()*outcomes.length)] + '\n\nMorale +8, Faith +3');
                        break;
                    case 'tend_fire':
                        const timber = state.playerResources.Timber || 0;
                        if(timber < 1){toast('No timber. The fire dwindles.');break;}
                        state.playerResources.Timber -= 1;
                        state.morale = Math.min(100, state.morale + 3);
                        toast('🔥 You add timber to the council fire. The flames rise. The hall warms. Morale +3');
                        break;
                }
                saveState();
            };
            
            await loader.load('json/scenes/great_hall.json');
            
            document.addEventListener('click',(e)=>{
                if(Math.random()>0.75 && !e.target.closest('.zone')){
                    const spark = document.createElement('div');
                    spark.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:3px;height:3px;background:#d4af37;border-radius:50%;box-shadow:0 0 10px #d4af37;pointer-events:none;z-index:150;animation:sparkFade 1.2s ease-out forwards;`;
                    document.body.appendChild(spark);
                    setTimeout(()=>spark.remove(),1300);
                }
            });
        }
        
        init();
    </script>
</body>
</html>
