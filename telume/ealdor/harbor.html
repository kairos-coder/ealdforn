<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fjord Harbor · Ealdor</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #3d362f; --deep-stone: #2a2520; --mortar: #1a1612;
            --parchment: #f4e4c1; --ember: #c44f1c; --ember-bright: #e85d2c;
            --ash: #8b7d6b; --frost: #c8d8e4; --gold: #b8860b;
            --deep: #1a1410; --void: #0a0806;
            --water-deep: #1a3040; --water-mid: #2a4a6a; --water-shallow: #3a6b8c;
            --wood: #3d2b1f; --wood-light: #5c3a1f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--void);
            color: var(--parchment);
            font-family: 'Georgia','Times New Roman',serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #harbor-view {
            position: relative; width: 900px; max-width: 98vw;
            height: 650px; margin: 0 auto;
            overflow: hidden; background: var(--void);
            border: 4px solid var(--deep-stone); border-radius: 4px;
            box-shadow: 0 0 100px rgba(0,0,0,0.7), 0 0 200px rgba(0,0,0,0.3);
        }
        @media (max-width: 920px) {
            #harbor-view { width: 98vw; height: calc(98vw * 0.72); }
        }

        .zone { cursor: pointer; transition: filter 0.25s, transform 0.25s; }
        .zone:hover { filter: brightness(1.35); z-index: 50 !important; }
        .zone:active { transform: scale(0.94); }

        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,6,0.94); border: 1px solid var(--gold);
            border-radius: 6px; padding: 0.5rem 1.2rem;
            font-family: 'Georgia',serif; font-size: 0.78rem;
            z-index: 200; opacity: 0; transition: opacity 0.35s;
            pointer-events: none; text-align: center; max-width: 420px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5); white-space: pre-line;
        }
        #toast.show { opacity: 1; }

        @keyframes waveDrift { 0%{transform:translateX(0)} 50%{transform:translateX(8px)} 100%{transform:translateX(0)} }
        @keyframes shipBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
        @keyframes lanternGlow { 0%,100%{box-shadow:0 0 8px #daa520,0 0 16px rgba(218,165,32,0.3)} 50%{box-shadow:0 0 14px #ffd700,0 0 28px rgba(218,165,32,0.5)} }
        @keyframes sparkFade { 0%{transform:scale(0.5);opacity:1} 100%{transform:scale(2.5);opacity:0} }
        @keyframes gullGlide { 0%{transform:translate(0,0)} 50%{transform:translate(80px,-10px)} 100%{transform:translate(160px,0)} }
    </style>
</head>
<body>

    <div id="harbor-view"></div>
    <div id="toast"></div>

    <script src="js/font-mason.js"></script>
    <script>
    /*
     * ═══════════════════════════════════════════════════════
     * THE FJORD HARBOR · Ealdor
     * Pontus waves (canvas) + Font-Mason structures + JSON objects
     * ═══════════════════════════════════════════════════════
     */

    // ── STATE ──
    const DEFAULT_STATE = {
        year: 3450, season: 0, ice: 15,
        playerResources: { Stone: 4, Timber: 3, Grain: 5, Iron: 2, Salt: 2, Cloth: 3 },
        population: 100, morale: 70, faith: 60,
        tabletFragments: 0, crisisHistory: [],
    };
    let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

    function loadState() {
        const raw = localStorage.getItem('ealdor_save');
        if (!raw) return false;
        try { state = { ...DEFAULT_STATE, ...JSON.parse(raw) }; return true; } catch(e) { return false; }
    }
    function saveState() { localStorage.setItem('ealdor_save', JSON.stringify(state)); }

    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(msg, d = 2800) {
        toastEl.textContent = msg; toastEl.classList.add('show');
        clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), d);
    }

    // ── PONTUS WAVE ENGINE (lightweight, no GAIA dependency) ──
    const WAVE_TITANS = [
        { name:'oceanus', glyph:'🌀', freq:0.8, amp:1.0, color:[30,100,160] },
        { name:'tethys',   glyph:'💧', freq:0.9, amp:0.7, color:[40,110,170] },
        { name:'rhea',     glyph:'🌊', freq:1.0, amp:0.6, color:[35,105,165] },
        { name:'pontus',   glyph:'🌑', freq:0.7, amp:0.9, color:[25,95,155] },
        { name:'nerus',    glyph:'🐚', freq:1.1, amp:0.5, color:[45,115,175] },
        { name:'thalassa', glyph:'🫧', freq:0.85, amp:0.55, color:[38,108,168] },
    ];
    const waveOffsets = WAVE_TITANS.map(() => Math.random() * Math.PI * 2);

    function buildHarbor() {
        const container = document.getElementById('harbor-view');
        container.innerHTML = '';
        const m = new FontMason('harbor-view');
        const ice = state.ice;

        // ═══════════════════════════════════
        // SKY CANVAS (starfield)
        // ═══════════════════════════════════
        const skyCanvas = document.createElement('canvas');
        skyCanvas.id = 'sky-canvas';
        skyCanvas.width = 900; skyCanvas.height = 120;
        skyCanvas.style.cssText = 'position:absolute;left:0;top:0;z-index:0;pointer-events:none;';
        container.appendChild(skyCanvas);
        
        const skyCtx = skyCanvas.getContext('2d');
        const stars = Array.from({length:60}, () => ({x:Math.random()*900, y:Math.random()*120, r:Math.random()*1.2, a:Math.random()*0.5+0.1, tw:Math.random()*Math.PI*2}));
        
        function drawSky() {
            skyCtx.clearRect(0,0,900,120);
            const grad = skyCtx.createLinearGradient(0,0,0,120);
            grad.addColorStop(0, '#0a0f1a'); grad.addColorStop(1, '#1a2a40');
            skyCtx.fillStyle = grad; skyCtx.fillRect(0,0,900,120);
            stars.forEach(s => {
                const a = s.a * (0.7 + 0.3 * Math.sin(Date.now()*0.001 + s.tw));
                skyCtx.beginPath(); skyCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                skyCtx.fillStyle = `rgba(200,216,228,${a})`; skyCtx.fill();
            });
            requestAnimationFrame(drawSky);
        }
        drawSky();

        // Gulls
        for (let i = 0; i < 3; i++) {
            const gull = document.createElement('div');
            gull.style.cssText = `position:absolute;left:${100+i*250}px;top:${15+i*20}px;color:#8b9baa;font-size:10px;font-family:Georgia,serif;pointer-events:none;z-index:1;animation:gullGlide ${8+i*3}s ease-in-out ${i*2}s infinite;`;
            gull.textContent = '⌣'; container.appendChild(gull);
        }

        // ═══════════════════════════════════
        // CASTLE WALL (font-mason)
        // ═══════════════════════════════════
        m.buildWall({ chars:['▓','▒','░','▓','▒'], textColor:'#2a2520', mortarColor:'#1a1410', fontSize:28, lineHeight:0.48, letterSpacing:-2, fontFamily:'monospace', x:0, y:65, width:900, height:45, z:2 });
        m.buildWall({ chars:['█','▓','█','▓','█'], textColor:'#3d362f', mortarColor:'#2a2520', fontSize:16, lineHeight:0.45, letterSpacing:2, fontFamily:'monospace', x:0, y:52, width:900, height:18, z:3 });
        m.buildPillar({ chars:['▓','▓','▓'], textColor:'#3d362f', mortarColor:'#2a2520', fontSize:20, fontFamily:'monospace', x:120, y:20, width:32, height:60, z:4, capital:true, capitalHeight:12 });
        m.buildPillar({ chars:['▓','▓','▓'], textColor:'#3d362f', mortarColor:'#2a2520', fontSize:20, fontFamily:'monospace', x:748, y:20, width:32, height:60, z:4, capital:true, capitalHeight:12 });
        m.buildWall({ chars:['█','▓','█','▓','█'], textColor:'#3d362f', mortarColor:'#2a2520', fontSize:22, lineHeight:0.5, letterSpacing:-1, fontFamily:'monospace', x:380, y:38, width:140, height:55, z:4, openings:[{ x:35, y:12, width:70, height:43, arch:true }] });
        m.buildInscription({ text:'GATE', x:420, y:24, fontSize:7, color:'#8b7d6b', fontFamily:"'Cinzel',serif", z:5 });

        // Tower lanterns
        const l1 = document.createElement('div');
        l1.style.cssText = 'position:absolute;left:130px;top:32px;width:10px;height:10px;background:#daa520;border-radius:50%;z-index:5;animation:lanternGlow 3s ease-in-out infinite;pointer-events:none;';
        container.appendChild(l1);
        const l2 = document.createElement('div');
        l2.style.cssText = 'position:absolute;left:758px;top:32px;width:10px;height:10px;background:#daa520;border-radius:50%;z-index:5;animation:lanternGlow 3s ease-in-out infinite;pointer-events:none;';
        container.appendChild(l2);

        // ═══════════════════════════════════
        // PONTUS WATER CANVAS
        // ═══════════════════════════════════
        const pontusCanvas = document.createElement('canvas');
        pontusCanvas.id = 'pontus-canvas';
        pontusCanvas.width = 900; pontusCanvas.height = 310;
        pontusCanvas.style.cssText = 'position:absolute;left:0;top:110px;z-index:1;pointer-events:none;';
        container.appendChild(pontusCanvas);
        
        const pCtx = pontusCanvas.getContext('2d');
        
        function drawPontus() {
            const W = 900, H = 310;
            pCtx.clearRect(0, 0, W, H);
            
            // Deep water base
            const bg = pCtx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0, '#0a1828'); bg.addColorStop(0.5, '#122438'); bg.addColorStop(1, '#1a3048');
            pCtx.fillStyle = bg; pCtx.fillRect(0, 0, W, H);
            
            // Titan waves
            WAVE_TITANS.forEach((t, i) => {
                waveOffsets[i] += 0.012 * t.freq;
                const yC = 40 + i * 42;
                const amp = 10 + t.amp * 18 + Math.sin(Date.now() * 0.0005 + i) * 4;
                
                pCtx.beginPath();
                pCtx.strokeStyle = `rgba(${t.color[0]},${t.color[1]},${t.color[2]},0.5)`;
                pCtx.lineWidth = 1.5;
                
                for (let x = 0; x <= W; x += 3) {
                    const y = yC + Math.sin(x * 0.006 + waveOffsets[i]) * amp 
                            + Math.sin(x * 0.015 + waveOffsets[i] * 0.7) * (amp * 0.3)
                            + Math.sin(x * 0.03 + waveOffsets[i] * 1.3) * (amp * 0.12);
                    x === 0 ? pCtx.moveTo(x, y) : pCtx.lineTo(x, y);
                }
                pCtx.stroke();
            });
            
            // Shimmer layer
            pCtx.fillStyle = 'rgba(180,210,240,0.04)';
            for (let i = 0; i < 30; i++) {
                const sx = ((i * 137.5) % 900);
                const sy = 120 + ((i * 97.3) % 180);
                const sa = 0.3 + 0.3 * Math.sin(Date.now() * 0.002 + i);
                pCtx.globalAlpha = sa;
                pCtx.fillRect(sx, sy, 1.5, 1.5);
            }
            pCtx.globalAlpha = 1;
            
            requestAnimationFrame(drawPontus);
        }
        drawPontus();

        // ═══════════════════════════════════
        // ICE OVERLAY
        // ═══════════════════════════════════
        if (ice > 20) {
            const iceCanvas = document.createElement('canvas');
            iceCanvas.width = 900; iceCanvas.height = 310;
            iceCanvas.style.cssText = 'position:absolute;left:0;top:110px;z-index:2;pointer-events:none;';
            container.appendChild(iceCanvas);
            const iceCtx = iceCanvas.getContext('2d');
            
            const iceOpacity = Math.min(0.85, ice / 100);
            const iceHeight = Math.min(300, ice * 3.5);
            
            const iceGrad = iceCtx.createLinearGradient(0, 0, 0, iceHeight);
            iceGrad.addColorStop(0, `rgba(200,216,228,${iceOpacity})`);
            iceGrad.addColorStop(0.6, `rgba(200,216,228,${iceOpacity * 0.5})`);
            iceGrad.addColorStop(1, 'rgba(200,216,228,0)');
            iceCtx.fillStyle = iceGrad;
            iceCtx.fillRect(0, 0, 900, iceHeight);
            
            // Ice edge
            iceCtx.fillStyle = `rgba(232,240,248,${iceOpacity})`;
            iceCtx.font = '14px monospace';
            iceCtx.fillText('▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔▁▔', 0, iceHeight);
        }

        // ═══════════════════════════════════
        // SHIP (font-mason on water)
        // ═══════════════════════════════════
        const shipContainer = document.createElement('div');
        shipContainer.style.cssText = 'position:absolute;left:270px;top:280px;z-index:3;animation:shipBob 4s ease-in-out infinite;';
        shipContainer.innerHTML = `
            <div style="color:#4a3020;font-size:18px;font-family:monospace;">▬▬▬▬▬▬▬</div>
            <div style="color:#3d2b1f;font-size:14px;font-family:monospace;margin-left:10px;margin-top:-6px;">▬▬▬▬▬</div>
            <div style="color:#5c3a1f;font-size:12px;font-family:monospace;margin-left:4px;margin-top:-4px;">▬▬▬</div>
            <div style="color:#3d2b1f;font-size:10px;font-family:monospace;margin-left:20px;margin-top:-12px;">│</div>
            <div style="color:#6b4f3d;font-size:8px;font-family:monospace;margin-left:16px;margin-top:-2px;">▬▬</div>
        `;
        shipContainer.className = 'zone';
        shipContainer.title = 'A fishing vessel. Nets hang drying.';
        shipContainer.addEventListener('click', () => {
            const salt = state.playerResources?.Salt || 0;
            toast(salt > 0 
                ? '🚢 The vessel bobs quietly. A sailor nods. "Heading out? Ice is coming."' 
                : '🚢 An empty fishing vessel. The crew is at the market.');
        });
        container.appendChild(shipContainer);

        // ═══════════════════════════════════
        // DOCK (loaded from JSON concept)
        // ═══════════════════════════════════
        buildDock(m, container);

        // ═══════════════════════════════════
        // BUILDINGS
        // ═══════════════════════════════════
        m.buildWall({ chars:['▓','▒','░','▓','▒'], textColor:'#4a3f35', mortarColor:'#2a2520', fontSize:20, lineHeight:0.5, letterSpacing:-1, fontFamily:'monospace', x:50, y:430, width:120, height:80, z:6, openings:[{ x:40, y:30, width:40, height:50, arch:true }] });
        m.buildWall({ chars:['⌣','⌢','~','⋅','⌣'], textColor:'#3d3028', mortarColor:'#2a2018', fontSize:14, lineHeight:0.6, letterSpacing:1, fontFamily:"'Georgia',serif", x:45, y:420, width:130, height:15, z:7 });
        m.buildInscription({ text:'HARBOR', x:75, y:460, fontSize:7, color:'#8b7d6b', fontFamily:"'Cinzel',serif", z:8 });

        // Smoke
        const smoke = document.createElement('div');
        smoke.style.cssText = 'position:absolute;left:150px;top:415px;color:rgba(139,125,107,0.25);font-size:8px;font-family:Georgia,serif;pointer-events:none;z-index:8;';
        smoke.textContent = '░\n▒\n░';
        container.appendChild(smoke);

        m.buildWall({ chars:['▓','▒','▓','▒','▓'], textColor:'#4a3f35', mortarColor:'#2a2520', fontSize:22, lineHeight:0.5, letterSpacing:-1, fontFamily:'monospace', x:690, y:435, width:160, height:75, z:6, openings:[{ x:60, y:22, width:50, height:53, arch:true }] });
        m.buildWall({ chars:['⌣','⌢','~','⋅','⌣'], textColor:'#3d3028', mortarColor:'#2a2018', fontSize:14, lineHeight:0.6, letterSpacing:1, fontFamily:"'Georgia',serif", x:685, y:425, width:170, height:15, z:7 });
        m.buildInscription({ text:'WAREHOUSE', x:725, y:465, fontSize:7, color:'#8b7d6b', fontFamily:"'Cinzel',serif", z:8 });

        // ═══════════════════════════════════
        // MARKET STALLS
        // ═══════════════════════════════════
        m.buildFloor({ chars:['▓','░','▒','█','░'], textColor:'#6b5d4f', mortarColor:'#4a3f35', fontSize:28, lineHeight:0.47, letterSpacing:-2, fontFamily:"'Georgia','Times New Roman',serif", x:30, y:510, width:840, height:45, z:5, perspectiveStrength:5 });

        const stalls = [
            { x:80, label:'FISH', glyphs:'≋ ≋ ≋', color:'#3a6b8c' },
            { x:200, label:'SALT', glyphs:'◇ ◇ ◇', color:'#c8d8e4' },
            { x:320, label:'CLOTH', glyphs:'║ ╎ │ ╎', color:'#f4e4c1' },
            { x:440, label:'TIMBER', glyphs:'▬ ▬ ▬', color:'#8b6d4a' },
            { x:560, label:'IRON', glyphs:'◆ ◆ ◆', color:'#6b5d4f' },
        ];
        stalls.forEach(s => {
            m.buildWall({ chars:['▬','▬','▬'], textColor:'#5c4f42', mortarColor:'#3d362f', fontSize:12, lineHeight:0.5, letterSpacing:0, fontFamily:'monospace', x:s.x, y:520, width:70, height:18, z:6 });
            m.buildInscription({ text:s.label, x:s.x+8, y:513, fontSize:6, color:'#8b7d6b', fontFamily:"'Cinzel',serif", z:7 });
            m.buildInscription({ text:s.glyphs, x:s.x+6, y:528, fontSize:8, color:s.color, fontFamily:'monospace', z:7 });
        });

        // ═══════════════════════════════════
        // PATHS + NOTICE BOARD
        // ═══════════════════════════════════
        m.buildFloor({ chars:['▓','░','▒','█','░'], textColor:'#5c4f42', mortarColor:'#3a3028', fontSize:32, lineHeight:0.47, letterSpacing:-2, fontFamily:"'Georgia','Times New Roman',serif", x:0, y:555, width:900, height:65, z:5, perspectiveStrength:3 });

        m.buildInscription({ text:'CHAPEL →', x:60, y:565, fontSize:7, color:'#8b7d6b', fontFamily:"'Cinzel',serif", z:6 });
        m.buildInscription({ text:'·  ·  ·  ·  ·  ·  ·', x:80, y:580, fontSize:8, color:'rgba(0,0,0,0.25)', fontFamily:"'Georgia',serif", z:6 });
        m.buildInscription({ text:'← COURTYARD', x:650, y:595, fontSize:7, color:'#8b7d6b', fontFamily:"'Cinzel',serif", z:6 });
        m.buildInscription({ text:'·  ·  ·  ·  ·  ·  ·', x:660, y:610, fontSize:8, color:'rgba(0,0,0,0.25)', fontFamily:"'Georgia',serif", z:6 });

        // Notice post
        m.buildPillar({ chars:['║','║','║'], textColor:'#3d2b1f', mortarColor:'#2a1f15', fontSize:8, fontFamily:'monospace', x:430, y:570, width:8, height:35, z:6 });
        const notice = document.createElement('div');
        notice.className = 'zone';
        notice.title = 'Harbor notices';
        notice.style.cssText = 'position:absolute;left:410px;top:555px;width:50px;height:22px;background:#f4e4c1;border:2px solid #3d2b1f;z-index:7;cursor:pointer;font-size:5px;color:#1a1410;font-family:monospace;text-align:center;padding:2px;';
        notice.textContent = 'ICE\nWARNING';
        notice.addEventListener('click', () => {
            const il = state.ice;
            toast(`📋 Ice: ${il}%\n\n${il<30?'Fjord open. Ships pass.':il<55?'Caution. Passages narrowing.':il<80?'Heavy ice. Dock traffic halted.':'Fjord frozen. Harbor locked.'}`);
        });
        container.appendChild(notice);

        // Click zones for navigation
        const chapelZone = document.createElement('div');
        chapelZone.className = 'zone';
        chapelZone.title = 'Walk to the Coal Chapel';
        chapelZone.style.cssText = 'position:absolute;left:20px;top:555px;width:140px;height:50px;z-index:10;';
        chapelZone.addEventListener('click', () => { saveState(); setTimeout(() => { window.location.href = 'chapel.html?from=harbor'; }, 800); });
        container.appendChild(chapelZone);

        const courtZone = document.createElement('div');
        courtZone.className = 'zone';
        courtZone.title = 'Return to the courtyard';
        courtZone.style.cssText = 'position:absolute;left:630px;top:580px;width:150px;height:40px;z-index:10;';
        courtZone.addEventListener('click', () => { saveState(); setTimeout(() => { window.location.href = 'index.html?from=harbor'; }, 800); });
        container.appendChild(courtZone);

        return m;
    }

    // ── DOCK BUILDER (would be dock.json) ──
    function buildDock(m, container) {
        m.buildWall({ chars:['▓','▒','░','█','▓'], textColor:'#5c4f42', mortarColor:'#3a3028', fontSize:30, lineHeight:0.47, letterSpacing:-2, fontFamily:"'Georgia','Times New Roman',serif", x:0, y:365, width:900, height:25, z:5 });
        m.buildFloor({ chars:['▓','░','▒','█','░'], textColor:'#5c4f42', mortarColor:'#3a3028', fontSize:26, lineHeight:0.47, letterSpacing:-2, fontFamily:"'Georgia','Times New Roman',serif", x:30, y:385, width:840, height:45, z:5, perspectiveStrength:5 });

        // Pier extending into water
        m.buildWall({ chars:['║','│','╎','│','║'], textColor:'#3d2b1f', mortarColor:'#2a1f15', fontSize:13, lineHeight:0.5, letterSpacing:0, fontFamily:'monospace', x:380, y:310, width:40, height:58, z:5 });
        m.buildWall({ chars:['▬','▬','▬','▬','▬'], textColor:'#4a3020', mortarColor:'#3d2b1f', fontSize:11, lineHeight:0.5, letterSpacing:0, fontFamily:'monospace', x:372, y:328, width:56, height:12, z:6 });

        // Mooring posts
        m.buildPillar({ chars:['║','║','║'], textColor:'#3d2b1f', mortarColor:'#2a1f15', fontSize:9, fontFamily:'monospace', x:372, y:318, width:7, height:30, z:6 });
        m.buildPillar({ chars:['║','║','║'], textColor:'#3d2b1f', mortarColor:'#2a1f15', fontSize:9, fontFamily:'monospace', x:422, y:318, width:7, height:30, z:6 });

        // Crane
        m.buildPillar({ chars:['║','║','║'], textColor:'#3d2b1f', mortarColor:'#2a1f15', fontSize:11, fontFamily:'monospace', x:530, y:360, width:9, height:40, z:6 });
        m.buildWall({ chars:['▬','▬','▬'], textColor:'#4a3020', mortarColor:'#3d2b1f', fontSize:9, lineHeight:0.5, letterSpacing:0, fontFamily:'monospace', x:518, y:355, width:33, height:7, z:7 });
        const rope = document.createElement('div');
        rope.style.cssText = 'position:absolute;left:534px;top:362px;color:#6b5d4f;font-size:7px;font-family:monospace;z-index:7;pointer-events:none;';
        rope.textContent = '│';
        container.appendChild(rope);

        // Lantern on dock
        const lantern = document.createElement('div');
        lantern.style.cssText = 'position:absolute;left:536px;top:348px;width:5px;height:5px;background:#daa520;border-radius:50%;z-index:8;animation:lanternGlow 2s ease-in-out infinite;pointer-events:none;';
        container.appendChild(lantern);
    }

    // ── INIT ──
    function init() {
        loadState();
        toast(`🚢 The Fjord Harbor · Ice: ${state.ice}% · ${state.ice < 40 ? 'Ships pass.' : state.ice < 70 ? 'Ice closes in.' : 'The harbor freezes.'}`);
        buildHarbor();

        document.addEventListener('click', (e) => {
            if (Math.random() > 0.8 && !e.target.closest('.zone')) {
                const spark = document.createElement('div');
                spark.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:3px;height:3px;background:#d4af37;border-radius:50%;box-shadow:0 0 10px #d4af37;pointer-events:none;z-index:150;animation:sparkFade 1.2s ease-out forwards;`;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1300);
            }
        });
    }

    init();
    </script>
</body>
</html>
