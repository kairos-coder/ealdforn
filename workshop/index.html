<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kairos Kernel · Creative Writing Engine</title>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #222;
  --text: #d4c8b5;
  --text-dim: #8a7e6e;
  --gold: #c9a84c;
  --gold-dim: #7a6438;
  --red: #8b3a3a;
  --red-glow: #c44;
  --blue: #3a5f8b;
  --blue-glow: #5a9fcf;
  --green: #4a7a4a;
  --purple: #6b4e8b;
  --font: 'Georgia', 'Times New Roman', serif;
  --mono: 'Courier New', monospace;
  --radius: 6px;
  --gap: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#app {
  width: 100%;
  max-width: 680px;
  padding: 16px var(--gap);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Header */
.header {
  text-align: center;
  padding: 20px 0 8px;
  border-bottom: 1px solid var(--gold-dim);
}
.header h1 {
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: 2px;
  font-weight: normal;
}
.header .subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Panels */
.panel {
  background: var(--surface);
  border: 1px solid #2a2a2a;
  border-radius: var(--radius);
  padding: 14px;
}
.panel h2 {
  font-size: 0.85rem;
  color: var(--gold-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: normal;
  border-bottom: 1px solid #2a2a2a;
  padding-bottom: 6px;
}

/* Voice Selector */
.voice-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.voice-tab {
  flex: 1;
  min-width: 70px;
  padding: 8px 6px;
  background: var(--surface2);
  border: 1px solid #333;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.7rem;
  cursor: pointer;
  border-radius: var(--radius);
  text-align: center;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.voice-tab.active {
  border-color: var(--gold);
  color: var(--gold);
  background: #1a1a10;
}

/* Cards */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}
.card-chip {
  background: var(--surface2);
  border: 1px solid #333;
  border-radius: var(--radius);
  padding: 8px;
  text-align: center;
  cursor: pointer;
  font-size: 0.7rem;
  transition: all 0.15s;
  user-select: none;
}
.card-chip.selected {
  border-color: var(--gold);
  background: #1a1a10;
  color: var(--gold);
}
.card-chip .card-glyph {
  font-size: 1.4rem;
  display: block;
}
.card-chip .card-name {
  color: var(--text-dim);
  margin-top: 2px;
}

/* Triad Display */
.triad-display {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  padding: 10px 0;
}
.triad-slot {
  width: 64px;
  height: 64px;
  border: 2px dashed #333;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  color: var(--text-dim);
  transition: all 0.3s;
}
.triad-slot.filled {
  border-color: var(--gold-dim);
  color: var(--gold);
  border-style: solid;
}
.triad-label {
  font-size: 0.6rem;
  color: var(--text-dim);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Buttons */
.btn {
  padding: 10px 18px;
  background: var(--surface2);
  border: 1px solid #444;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.8rem;
  cursor: pointer;
  border-radius: var(--radius);
  letter-spacing: 1px;
  transition: all 0.2s;
  width: 100%;
}
.btn:hover {
  border-color: var(--gold-dim);
  color: var(--gold);
}
.btn.primary {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: #1a1a10;
}
.btn.primary:hover {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(201,168,76,0.15);
}

/* Output */
.output-area {
  background: var(--surface);
  border: 1px solid #2a2a2a;
  border-radius: var(--radius);
  padding: 18px 16px;
  min-height: 160px;
  font-family: var(--font);
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  position: relative;
}
.output-area .hem { color: var(--blue-glow); }
.output-area .haw { color: var(--purple); }
.output-area .hum { color: var(--gold); }
.output-area .label {
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-top: 8px;
}
.output-area .label.hem-label { color: var(--blue); }
.output-area .label.haw-label { color: var(--purple); }
.output-area .label.hum-label { color: var(--gold-dim); }

/* Metadata strip */
.meta-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 0.65rem;
  color: var(--text-dim);
  font-family: var(--mono);
  padding: 8px 0;
}
.meta-tag {
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid #2a2a2a;
}

/* Resonance bar */
.res-bar-wrap {
  height: 4px;
  background: #222;
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.res-bar-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.5s;
}

/* Footer */
.footer {
  text-align: center;
  padding: 12px;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 2px;
}

/* Pulse animation */
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.5; }
}
.generating { animation: pulse 1.2s infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>

// ── STATE ──────────────────────────────
let selectedCards = [];
let activeVoice = 'sagas';
let isGenerating = false;

// ── INIT ───────────────────────────────
function init() {
  renderCards();
  bindVoiceTabs();
  document.getElementById('btnGenerate').addEventListener('click', generatePassage);
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  PERSONA_CARDS.forEach(card => {
    const chip = document.createElement('div');
    chip.className = 'card-chip';
    chip.dataset.cardId = card.id;
    chip.innerHTML = `<span class="card-glyph">${card.glyph}</span><span class="card-name">${card.name}</span>`;
    chip.addEventListener('click', () => toggleCard(card, chip));
    grid.appendChild(chip);
  });
}

function toggleCard(card, chip) {
  const idx = selectedCards.findIndex(c => c.id === card.id);
  if (idx >= 0) {
    selectedCards.splice(idx, 1);
    chip.classList.remove('selected');
  } else if (selectedCards.length < 3) {
    selectedCards.push(card);
    chip.classList.add('selected');
  } else {
    // Replace the oldest selection
    const oldest = selectedCards.shift();
    document.querySelector(`[data-card-id="${oldest.id}"]`)?.classList.remove('selected');
    selectedCards.push(card);
    chip.classList.add('selected');
  }
  updateTriadDisplay();
}

function updateTriadDisplay() {
  const slots = [
    document.getElementById('slotHem'),
    document.getElementById('slotHaw'),
    document.getElementById('slotHum')
  ];
  slots.forEach((slot, i) => {
    if (selectedCards[i]) {
      slot.textContent = selectedCards[i].glyph;
      slot.classList.add('filled');
    } else {
      slot.textContent = '⋯';
      slot.classList.remove('filled');
    }
  });
}

function bindVoiceTabs() {
  document.querySelectorAll('.voice-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.voice-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeVoice = tab.dataset.voice;
    });
  });
}

// ── ADZMIST RESONANCE SCORING ──────────
function scoreResonance(triadGlyphs) {
  let score = 0.5;
  if (new Set(triadGlyphs).size === 1) score += 0.3;
  if (triadGlyphs[0] === triadGlyphs[2]) score += 0.1;
  return Math.min(score, 1.0);
}

function identifySigil(triadGlyphs) {
  for (const [sigil, members] of Object.entries(RUNES)) {
    if (triadGlyphs.every(g => members.includes(g))) return sigil;
  }
  return '∴';
}

// ── QUIPOTEC BREATH VECTOR SELECTION ───

  const posMap = { 0:0, 1:1, 2:2 };
  const options = domainMap[card.domain] || ['GL-002','GL-007','GL-015'];
  const bvKey = options[posMap[position]] || 'GL-002';
  return BREATH_VECTORS[bvKey];
}

// ── PHONIC SELECTION ───────────────────
function selectPhonic(card, voiceProfile) {
  // Map card aspect to a phonic feel
  const aspectPhonics = {
    'Trickster / Boundary-Crosser': 'ʔa',
    'Bargainer / Poet': 'ma',
    'Three-in-One / Norn': '-i',
    'Wolf / Hunger': 'ʔi',
    'Messenger / Tide-Bearer': 'ha',
    'Threshold Lord / Keeper': 'to',
    'Bound Destroyer / Hunger': 'ke',
    'Young Keeper / Failed Then Rose': 'na',
    'Pattern-Reader / Patient': 'si',
    'Book-Bearer / Keeper of Ash': 'wi',
    'Rattler / Hunger-Philosopher': 'cha',
    'Guarantor / Chooser': 'ba'
  };
  const phonemeKey = aspectPhonics[card.aspect] || 'na';
  return PHONIC_MAP[phonemeKey] || PHONIC_MAP['na'];
}

// ── PROSE GENERATION ───────────────────
function generatePassage() {
  if (selectedCards.length !== 3) {
    const output = document.getElementById('output');
    output.innerHTML = '<span style="color:var(--red-glow)">Select exactly three archetypes (Hem · Haw · Hum).</span>';
    return;
  }
  if (isGenerating) return;
  isGenerating = true;
  const btn = document.getElementById('btnGenerate');
  btn.textContent = '⟳ Weaving...';
  btn.classList.add('generating');
  btn.disabled = true;

  // Small delay for feel + animation
  setTimeout(() => {
    const passage = buildPassage();
    renderPassage(passage);
    isGenerating = false;
    btn.textContent = '⚡ Generate Passage';
    btn.classList.remove('generating');
    btn.disabled = false;
  }, 400 + Math.random() * 300);
}

function buildPassage() {
  const voice = VOICE_PROFILES[activeVoice];
  const triadGlyphs = [
    voice.glyphMap.hem,
    voice.glyphMap.haw,
    voice.glyphMap.hum
  ];
  const sigil = identifySigil(triadGlyphs);
  const resonance = scoreResonance(triadGlyphs);

  // Build three lines (hem/haw/hum) from card data
  const positions = [
    { name:'hem', card:selectedCards[0], bvPos:0 },
    { name:'haw', card:selectedCards[1], bvPos:1 },
    { name:'hum', card:selectedCards[2], bvPos:2 }
  ];

  const lines = positions.map((pos, i) => {
    const card = pos.card;
    const bv = selectBreathVector(card, pos.bvPos);
    const phonic = selectPhonic(card, voice);

    // Pick template based on position
    let template;
    if (i === 0) {
      template = voice.openerTemplates[Math.floor(Math.random() * voice.openerTemplates.length)];
    } else if (i === 2) {
      template = voice.closerTemplates[Math.floor(Math.random() * voice.closerTemplates.length)];
    } else {
      template = voice.midTemplates[Math.floor(Math.random() * voice.midTemplates.length)];
    }

    // Fill template variables
    let line = template
      .replace('{domain}', card.domain)
      .replace('{aspect}', card.aspect)
      .replace('{card_name}', card.name)
      .replace('{title}', card.title)
      .replace('{breath_func}', bv.name.toLowerCase())
      .replace('{phonic_feel}', phonic.feel)
      .replace('{card_pair}', (PERSONA_CARDS.find(c => c.id === card.pair) || {}).name || card.pair);

    return {
      position: pos.name,
      card: card,
      line: line,
      breathVector: bv,
      phonic: phonic,
      glyph: triadGlyphs[i]
    };
  });

  return {
    lines: lines,
    sigil: sigil,
    resonance: resonance,
    voice: voice,
    triadGlyphs: triadGlyphs
  };
}

function renderPassage(passage) {
  const output = document.getElementById('output');
  const metaStrip = document.getElementById('metaStrip');
  const resBar = document.getElementById('resBar');

  // Build HTML output with hem/haw/hum labels
  let html = '';
  passage.lines.forEach(line => {
    html += `<span class="${line.position}">${line.line}</span>\n`;
    html += `<span class="label ${line.position}-label">${line.position} · ${line.card.name} · ${line.breathVector.name}</span>\n`;
    if (line.position !== 'hum') html += '\n';
  });

  output.innerHTML = html;

  // Build metadata strip
  const tags = [
    `Sigil: ${passage.sigil}`,
    `Triad: ${passage.triadGlyphs.join('')}`,
    `Resonance: ${passage.resonance.toFixed(2)}`,
    `Voice: ${passage.voice.name}`,
    `Phonic: ${passage.lines.map(l => l.phonic.feel).join(' → ')}`,
    `BV: ${passage.lines.map(l => l.breathVector.func).join(' › ')}`
  ];
  metaStrip.innerHTML = tags.map(t => `<span class="meta-tag">${t}</span>`).join('');

  // Resonance bar
  resBar.style.width = (passage.resonance * 100) + '%';
  if (passage.resonance >= 0.8) {
    resBar.style.background = 'var(--gold)';
  } else if (passage.resonance >= 0.6) {
    resBar.style.background = 'var(--blue-glow)';
  } else {
    resBar.style.background = 'var(--red-glow)';
  }
}
